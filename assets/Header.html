  /*
    Booking safety rule:
    Any visible button/link that clearly says Book Now, Booking, Reserve, or Book your stay
    routes to /booking.html, not to #booking, #book, a page section, or another page anchor.
  */
  function isBookingIntent(link){
    if(!link) return false;

    const text = (link.textContent || "").trim().toLowerCase();
    const aria = (link.getAttribute("aria-label") || "").trim().toLowerCase();
    const href = (link.getAttribute("href") || "").trim().toLowerCase();

    if(link.hasAttribute("data-fh-booking-link")) return true;

    return (
      text === "book now" ||
      text === "booking" ||
      text.includes("book your stay") ||
      text.includes("reserve") ||
      aria.includes("book") ||
      href === "#book" ||
      href === "#booking" ||
      href.includes("contact-booking")
    );
  }

  function normalizeBookingLinks(){
    document.querySelectorAll("a").forEach(function(link){

      if(href.startsWith("mailto:") || href.startsWith("tel:")) return;

      if(isBookingIntent(link)){
        link.setAttribute("href", bookingHref);
        link.setAttribute("data-fh-booking-link", "true");

    });

  function padDatePart(value){
    return String(value).padStart(2, "0");
  }

  function toISODate(date){
    return date.getFullYear() + "-" + padDatePart(date.getMonth() + 1) + "-" + padDatePart(date.getDate());
  }

  function monthLabel(date){
    return date.toLocaleDateString("en-US", { month:"long", year:"numeric" });
  }

  function formatCalendarPrice(value, currency){
    const amount = Number(value);
    if(!Number.isFinite(amount)) return "";
    return (currency || "CHF") + " " + amount.toLocaleString("en-US");
  }

  function pageToolbarDates(){
    const arrival = document.getElementById("fhArrival") || document.getElementById("fh-exp-checkin") || document.getElementById("fh-mobile-checkin");
    const departure = document.getElementById("fhDeparture") || document.getElementById("fh-exp-checkout") || document.getElementById("fh-mobile-checkout");
    return { checkIn: arrival && arrival.value || "", checkOut: departure && departure.value || "" };
  }

  function writeToolbarDates(checkIn, checkOut){
    const arrivalSelectors = ["#fhArrival", "#fh-exp-checkin", "#fh-mobile-checkin", "[name='checkIn']", "[name='arrival']"];
    const departureSelectors = ["#fhDeparture", "#fh-exp-checkout", "#fh-mobile-checkout", "[name='checkOut']", "[name='departure']"];

    arrivalSelectors.forEach(function(selector){
      document.querySelectorAll(selector).forEach(function(el){
        if("value" in el){
          el.value = checkIn || "";
          el.dispatchEvent(new Event("input", { bubbles:true }));
          el.dispatchEvent(new Event("change", { bubbles:true }));
        }
      });
    });

    departureSelectors.forEach(function(selector){
      document.querySelectorAll(selector).forEach(function(el){
        if("value" in el){
          el.value = checkOut || "";
          el.dispatchEvent(new Event("input", { bubbles:true }));
          el.dispatchEvent(new Event("change", { bubbles:true }));
        }
      });
    });

    try {
      localStorage.setItem("fhArrival", checkIn || "");
      localStorage.setItem("fhDeparture", checkOut || "");
      localStorage.setItem("fletschhornArrival", checkIn || "");
      localStorage.setItem("fletschhornDeparture", checkOut || "");
    } catch(error) {}
  }

  function ensureToolbarCalendarModal(){
    let modal = document.getElementById("fhToolbarCalendarModal");
    if(modal) return modal;

    modal = document.createElement("div");
    modal.id = "fhToolbarCalendarModal";
    modal.setAttribute("aria-hidden", "true");
    modal.setAttribute("role", "dialog");
    modal.setAttribute("aria-modal", "true");
    modal.dataset.fhGlobalCalendarInjected = "1";
    modal.innerHTML = `

      </div>
    `;

    document.body.appendChild(modal);

    modal.addEventListener("click", function(event){
      if(event.target === modal){
        closeToolbarCalendar();
        return;
      }

      if(event.target.closest("[data-fh-calendar-close]")){
        closeToolbarCalendar();
        return;
      }

      if(event.target.closest("[data-fh-calendar-prev]")){
        fhToolbarCalendarState.monthDate = new Date(
          fhToolbarCalendarState.monthDate.getFullYear(),
          fhToolbarCalendarState.monthDate.getMonth() - 1,

        );
        renderToolbarCalendar();
        return;

      if(event.target.closest("[data-fh-calendar-next]")){
        fhToolbarCalendarState.monthDate = new Date(
          fhToolbarCalendarState.monthDate.getFullYear(),
          fhToolbarCalendarState.monthDate.getMonth() + 1,
          1
        );
        renderToolbarCalendar();
        return;
      }

      const day = event.target.closest("#fhToolbarCalendarGrid .fh-day[data-date], #fhToolbarCalendarGrid button[data-date]");
      if(day && !day.disabled){
        selectToolbarCalendarDate(day.getAttribute("data-date"));
      }

    return modal;
  }

  function openToolbarCalendarModal(modal){

  async function fetchToolbarCalendarMonth(){
    const first = new Date(fhToolbarCalendarState.monthDate.getFullYear(), fhToolbarCalendarState.monthDate.getMonth(), 1);
    const last = new Date(fhToolbarCalendarState.monthDate.getFullYear(), fhToolbarCalendarState.monthDate.getMonth() + 1, 0);
    const url = FH_WORKER_BASE.replace(/\/$/, "") +
      "/calendar?listingId=" + encodeURIComponent(FH_LISTING_ID) +
      "&from=" + encodeURIComponent(toISODate(first)) +
      "&to=" + encodeURIComponent(toISODate(last));

    fhToolbarCalendarState.loading = true;

    try {
      const response = await fetch(url, {
        method:"GET",
        headers:{ "Accept":"application/json" },
        cache:"no-store"
      });
      const json = await response.json();
      const days = Array.isArray(json.days) ? json.days : [];
      fhToolbarCalendarState.days.clear();
      days.forEach(function(day){
        if(day && day.date){
          fhToolbarCalendarState.days.set(day.date, day);
        }
      });
    } catch(error) {
      console.warn("Fletschhorn clean toolbar calendar could not load:", error);
      fhToolbarCalendarState.days.clear();
    } finally {
      fhToolbarCalendarState.loading = false;
    }
  }

  async function renderToolbarCalendar(){
    const modal = ensureToolbarCalendarModal();
    if(modal.dataset.fhGlobalCalendarInjected !== "1") return;

    const title = modal.querySelector("#fhToolbarCalendarTitle");
    const grid = modal.querySelector("#fhToolbarCalendarGrid");
    const message = modal.querySelector("#fhToolbarCalendarMessage");

    if(title) title.textContent = monthLabel(fhToolbarCalendarState.monthDate);
    if(grid) grid.innerHTML = `<div style="grid-column:1/-1;padding:22px;text-align:center;color:rgba(25,23,20,.55)">Loading calendar…</div>`;

    await fetchToolbarCalendarMonth();

    if(title) title.textContent = monthLabel(fhToolbarCalendarState.monthDate);
    if(!grid) return;
    grid.innerHTML = "";

    const first = new Date(fhToolbarCalendarState.monthDate.getFullYear(), fhToolbarCalendarState.monthDate.getMonth(), 1);
    const last = new Date(fhToolbarCalendarState.monthDate.getFullYear(), fhToolbarCalendarState.monthDate.getMonth() + 1, 0);
    const firstDay = first.getDay();
    const daysInMonth = last.getDate();

    for(let i = 0; i < firstDay; i++){
      const empty = document.createElement("button");
      empty.type = "button";
      empty.className = "fh-day is-empty";
      empty.tabIndex = -1;
      grid.appendChild(empty);
    }

    for(let d = 1; d <= daysInMonth; d++){
      const date = new Date(fhToolbarCalendarState.monthDate.getFullYear(), fhToolbarCalendarState.monthDate.getMonth(), d);
      const iso = toISODate(date);
      const data = fhToolbarCalendarState.days.get(iso);
      const available = data ? (data.available !== false && data.status !== "booked" && data.status !== "blocked") : true;
      const price = data ? formatCalendarPrice(data.price, data.currency || "CHF") : "";
      const isSelected = iso === fhToolbarCalendarState.checkIn || iso === fhToolbarCalendarState.checkOut;
      const isRange = fhToolbarCalendarState.checkIn && fhToolbarCalendarState.checkOut && iso > fhToolbarCalendarState.checkIn && iso < fhToolbarCalendarState.checkOut;

      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = ["fh-day", available ? "" : "is-booked is-disabled", isSelected ? "is-selected" : "", isRange ? "is-range" : ""].filter(Boolean).join(" ");
      btn.setAttribute("data-date", iso);
      btn.disabled = !available;
      btn.innerHTML = `
        <strong>${d}</strong>
        <small>${price || "CHF —"}</small>
        <em>${available ? "" : "Booked"}</em>
      `;
      grid.appendChild(btn);
    }

    if(message){
      if(fhToolbarCalendarState.checkIn && fhToolbarCalendarState.checkOut){
        message.textContent = fhToolbarCalendarState.checkIn + " → " + fhToolbarCalendarState.checkOut;
      } else if(fhToolbarCalendarState.checkIn){
        message.textContent = "Arrival selected. Now choose departure.";
      } else {
        message.textContent = "Select your arrival date.";
      }
    }
  }

  function selectToolbarCalendarDate(iso){
    if(!fhToolbarCalendarState.checkIn || fhToolbarCalendarState.checkOut || iso < fhToolbarCalendarState.checkIn){
      fhToolbarCalendarState.checkIn = iso;
      fhToolbarCalendarState.checkOut = "";
    } else if(iso > fhToolbarCalendarState.checkIn){
      fhToolbarCalendarState.checkOut = iso;
    }

    writeToolbarDates(fhToolbarCalendarState.checkIn, fhToolbarCalendarState.checkOut);
    renderToolbarCalendar();

    if(fhToolbarCalendarState.checkIn && fhToolbarCalendarState.checkOut){
      window.setTimeout(function(){
        proceedAfterDates({
          checkIn:fhToolbarCalendarState.checkIn,
          checkOut:fhToolbarCalendarState.checkOut
        });
      }, 180);
    }
  }

  /* =====================================================================
     Review pop-up flow: after dates are chosen, instead of jumping to the
     booking page, show a review pop-up (people, availability, live price,
     gentle policy) and send the guest straight to checkout on "Reserve".
     ===================================================================== */
  const FH_RPOP_TEXT = {
    en:{kicker:"Your stay",title:"Review your stay",dates:"Dates",people:"How many people",availability:"Availability",available:"Available",unavailable:"Not available for these dates",change:"Change dates",reserve:"Reserve",night:"night",nights:"nights",policy:"Free cancellation up to 30 days before arrival. Full terms are shown at checkout.",next:"Next: your name, email & payment at checkout.",calc:"Calculating price…",total:"Total",minNights:"Please select at least 2 nights."},
    fr:{kicker:"Votre séjour",title:"Vérifiez votre séjour",dates:"Dates",people:"Combien de personnes",availability:"Disponibilité",available:"Disponible",unavailable:"Non disponible pour ces dates",change:"Modifier les dates",reserve:"Réserver",night:"nuit",nights:"nuits",policy:"Annulation gratuite jusqu’à 30 jours avant l’arrivée. Conditions complètes au paiement.",next:"Ensuite : nom, email et paiement au paiement.",calc:"Calcul du prix…",total:"Total",minNights:"Veuillez sélectionner au moins 2 nuits."},
    de:{kicker:"Ihr Aufenthalt",title:"Aufenthalt prüfen",dates:"Daten",people:"Wie viele Personen",availability:"Verfügbarkeit",available:"Verfügbar",unavailable:"Für diese Daten nicht verfügbar",change:"Daten ändern",reserve:"Reservieren",night:"Nacht",nights:"Nächte",policy:"Kostenlose Stornierung bis 30 Tage vor Anreise. Vollständige Bedingungen beim Checkout.",next:"Weiter: Name, E-Mail & Zahlung beim Checkout.",calc:"Preis wird berechnet…",total:"Gesamt",minNights:"Bitte wählen Sie mindestens 2 Nächte."},
    ru:{kicker:"Ваше пребывание",title:"Проверьте детали",dates:"Даты",people:"Сколько человек",availability:"Доступность",available:"Доступно",unavailable:"Недоступно на эти даты",change:"Изменить даты",reserve:"Забронировать",night:"ночь",nights:"ночей",policy:"Бесплатная отмена за 30 дней до заезда. Полные условия при оформлении.",next:"Далее: имя, email и оплата при оформлении.",calc:"Расчёт цены…",total:"Итого",minNights:"Выберите минимум 2 ночи."},
    he:{kicker:"השהייה שלכם",title:"סקירת השהייה",dates:"תאריכים",people:"כמה אנשים",availability:"זמינות",available:"זמין",unavailable:"לא זמין בתאריכים אלה",change:"שינוי תאריכים",reserve:"להזמין",night:"לילה",nights:"לילות",policy:"ביטול חינם עד 30 יום לפני ההגעה. התנאים המלאים מוצגים בתשלום.",next:"בהמשך: שם, אימייל ותשלום בתשלום.",calc:"מחשב מחיר…",total:"סך הכול",minNights:"נא לבחור לפחות 2 לילות."}
  };
  function rpopT(key){ const b = FH_RPOP_TEXT[getStoredFhLang()] || FH_RPOP_TEXT.en; return b[key] || FH_RPOP_TEXT.en[key] || ""; }

  const fhReviewState = { people:2, total:null, currency:"CHF", nights:0, available:false, loading:false, checkIn:"", checkOut:"" };
  let fhReviewOpening = false;

  function nightsBetween(a, b){ if(!a || !b) return 0; return Math.round((new Date(b + "T00:00:00") - new Date(a + "T00:00:00")) / 86400000); }

  function fhTrackHeader(name, data){
    try {
      window.dataLayer = window.dataLayer || [];
      window.dataLayer.push(Object.assign({ event:name }, data || {}));
      document.dispatchEvent(new CustomEvent("fh:track", { detail:Object.assign({ event:name }, data || {}) }));
    } catch(error) {}
  }

  function ensureReviewPopup(){
    let pop = document.getElementById("fhReviewPopup");
    if(pop) return pop;
    pop = document.createElement("div");
    pop.id = "fhReviewPopup";
    pop.setAttribute("aria-hidden", "true");
    pop.innerHTML = `
      <div class="fh-rpop-scrim" data-fh-rpop-close></div>
      <div class="fh-rpop-sheet" role="dialog" aria-modal="true" aria-labelledby="fhRpopTitle" tabindex="-1">
        <div class="fh-rpop-grip" aria-hidden="true"></div>
        <div class="fh-rpop-head">
          <div><p class="fh-rpop-kicker" id="fhRpopKicker">Your stay</p><h2 class="fh-rpop-title" id="fhRpopTitle">Review your stay</h2></div>
          <button type="button" class="fh-rpop-x" data-fh-rpop-close aria-label="Close">×</button>
        </div>
        <div class="fh-rpop-body">
          <div class="fh-rpop-row">
            <div><div class="fh-rpop-lab" id="fhRpopDatesLab">Dates</div><div class="fh-rpop-val" id="fhRpopDates">—</div></div>
            <button type="button" class="fh-rpop-ghost" id="fhRpopChange">Change dates</button>
          </div>
          <div class="fh-rpop-row">
            <div><div class="fh-rpop-lab" id="fhRpopPeopleLab">How many people</div></div>
            <div class="fh-rpop-step">
              <button type="button" id="fhRpopMinus" aria-label="Fewer">−</button>
              <input id="fhRpopPeople" type="number" inputmode="numeric" min="1" max="48" value="2" aria-label="How many people">
              <button type="button" id="fhRpopPlus" aria-label="More">+</button>
            </div>
          </div>
          <div class="fh-rpop-row">
            <div><div class="fh-rpop-lab" id="fhRpopAvailLab">Availability</div><div class="fh-rpop-val"><span class="fh-rpop-avail muted" id="fhRpopAvail">—</span></div></div>
          </div>
          <div class="fh-rpop-quote" id="fhRpopQuote"></div>
          <p class="fh-rpop-policy" id="fhRpopPolicy"></p>
        </div>
        <div class="fh-rpop-foot">
          <button type="button" class="fh-rpop-cta" id="fhRpopReserve">Reserve</button>
          <small class="fh-rpop-note" id="fhRpopNote"></small>
        </div>
      </div>
    `;
    document.body.appendChild(pop);
    pop.addEventListener("click", function(event){ if(event.target.closest("[data-fh-rpop-close]")) closeReviewPopup(); });
    pop.querySelector("#fhRpopChange").addEventListener("click", function(){ closeReviewPopup(); openHeaderSchedule(); });
    pop.querySelector("#fhRpopMinus").addEventListener("click", function(){ rpopSetPeople(-1); });
    pop.querySelector("#fhRpopPlus").addEventListener("click", function(){ rpopSetPeople(1); });
    pop.querySelector("#fhRpopPeople").addEventListener("change", function(){ const v = Math.min(48, Math.max(1, Number(this.value) || 1)); this.value = v; fhReviewState.people = v; });
    pop.querySelector("#fhRpopReserve").addEventListener("click", reserveToCheckout);
    return pop;
  }

  function rpopSetPeople(delta){
    const input = document.getElementById("fhRpopPeople");
    const v = Math.min(48, Math.max(1, (parseInt(input.value, 10) || 1) + delta));
    input.value = v; fhReviewState.people = v;
  }

  function applyReviewText(){
    const pop = document.getElementById("fhReviewPopup"); if(!pop) return;
    pop.querySelector("#fhRpopKicker").textContent = rpopT("kicker");
    pop.querySelector("#fhRpopTitle").textContent = rpopT("title");
    pop.querySelector("#fhRpopDatesLab").textContent = rpopT("dates");
    pop.querySelector("#fhRpopPeopleLab").textContent = rpopT("people");
    pop.querySelector("#fhRpopAvailLab").textContent = rpopT("availability");
    pop.querySelector("#fhRpopChange").textContent = rpopT("change");
    pop.querySelector("#fhRpopReserve").textContent = rpopT("reserve");
    pop.querySelector("#fhRpopPolicy").textContent = rpopT("policy");
    pop.querySelector("#fhRpopNote").textContent = rpopT("next");
  }

  async function openReviewPopup(dates){
    const pop = ensureReviewPopup();
    fhReviewState.checkIn = dates.checkIn;
    fhReviewState.checkOut = dates.checkOut;
    fhReviewState.nights = nightsBetween(dates.checkIn, dates.checkOut);
    applyReviewText();
    document.getElementById("fhRpopPeople").value = fhReviewState.people || 2;
    pop.classList.add("open");
    pop.setAttribute("aria-hidden", "false");
    document.documentElement.classList.add("fh-rpop-open");
    const sheet = pop.querySelector(".fh-rpop-sheet"); if(sheet) sheet.focus();
    renderReviewPopup();
    fhTrackHeader("fh_check_availability", { check_in:dates.checkIn, check_out:dates.checkOut, nights:fhReviewState.nights });
    await computeReviewQuote();
    renderReviewPopup();
  }

  function closeReviewPopup(){
    const pop = document.getElementById("fhReviewPopup"); if(!pop) return;
    pop.classList.remove("open");
    pop.setAttribute("aria-hidden", "true");
    document.documentElement.classList.remove("fh-rpop-open");
  }

  async function computeReviewQuote(){
    fhReviewState.loading = true; fhReviewState.total = null; fhReviewState.available = false;
    try {
      const url = FH_WORKER_BASE.replace(/\/$/, "") + "/calendar?listingId=" + encodeURIComponent(FH_LISTING_ID) +
        "&from=" + encodeURIComponent(fhReviewState.checkIn) + "&to=" + encodeURIComponent(fhReviewState.checkOut);
      const response = await fetch(url, { headers:{ "Accept":"application/json" }, cache:"no-store" });
      const json = await response.json();
      const map = new Map();
      (Array.isArray(json.days) ? json.days : []).forEach(function(d){ if(d && d.date) map.set(d.date, d); });
      let total = 0, ok = true, currency = "CHF";
      for(let dt = new Date(fhReviewState.checkIn + "T00:00:00"); dt < new Date(fhReviewState.checkOut + "T00:00:00"); dt.setDate(dt.getDate() + 1)){
        const info = map.get(toISODate(dt));
        if(!info){ ok = false; continue; }
        if(info.available === false || info.status === "booked" || info.status === "blocked") ok = false;
        const amount = Number(info.price);
        if(Number.isFinite(amount)) total += amount; else ok = false;
        currency = info.currency || currency;
      }
      fhReviewState.available = ok; fhReviewState.total = ok ? total : null; fhReviewState.currency = currency;
    } catch(error) {
      fhReviewState.available = false; fhReviewState.total = null;
    } finally {
      fhReviewState.loading = false;
    }
  }

  function renderReviewPopup(){
    const pop = document.getElementById("fhReviewPopup");
    if(!pop || !pop.classList.contains("open")) return;
    const n = fhReviewState.nights;
    pop.querySelector("#fhRpopDates").textContent = fhReviewState.checkIn + " → " + fhReviewState.checkOut + " · " + n + " " + (n === 1 ? rpopT("night") : rpopT("nights"));
    const avail = pop.querySelector("#fhRpopAvail");
    const quote = pop.querySelector("#fhRpopQuote");
    const reserve = pop.querySelector("#fhRpopReserve");
    if(fhReviewState.loading){
      avail.className = "fh-rpop-avail muted"; avail.textContent = rpopT("calc");
      quote.innerHTML = ""; reserve.disabled = true; return;
    }
    if(fhReviewState.available && fhReviewState.total != null){
      avail.className = "fh-rpop-avail"; avail.textContent = rpopT("available");
      const money = formatCalendarPrice(Math.round(fhReviewState.total), fhReviewState.currency);
      quote.innerHTML = '<div class="fh-rpop-qrow"><span>' + n + " " + (n === 1 ? rpopT("night") : rpopT("nights")) + '</span><span>' + money + '</span></div>' +
        '<div class="fh-rpop-qrow total"><span>' + rpopT("total") + '</span><b>' + money + '</b></div>';
      reserve.disabled = false;
    } else {
      avail.className = "fh-rpop-avail no"; avail.textContent = rpopT("unavailable");
      quote.innerHTML = ""; reserve.disabled = true;
    }
  }

  function reserveToCheckout(){
    if(!fhReviewState.available || fhReviewState.total == null) return;
    const money = formatCalendarPrice(Math.round(fhReviewState.total), fhReviewState.currency);
    const params = new URLSearchParams({
      checkIn:fhReviewState.checkIn,
      checkOut:fhReviewState.checkOut,
      adults:String(fhReviewState.people || 2),
      guests:String(fhReviewState.people || 2),
      lang:getStoredFhLang(),
      source:"header-popup",
      finalTotal:String(Math.round(fhReviewState.total)),
      finalCurrency:fhReviewState.currency || "CHF",
      finalPriceText:money
    });
    fhTrackHeader("begin_checkout", { check_in:fhReviewState.checkIn, check_out:fhReviewState.checkOut, value:Math.round(fhReviewState.total), currency:fhReviewState.currency, people:fhReviewState.people });
    window.location.href = checkoutHref + "?" + params.toString();
  }

  function proceedAfterDates(dates){
    if(!dates || !dates.checkIn || !dates.checkOut) return false;
    if(nightsBetween(dates.checkIn, dates.checkOut) < 2){
      fhToolbarCalendarState.checkOut = "";
      writeToolbarDates(fhToolbarCalendarState.checkIn, "");
      const msg = document.getElementById("fhToolbarCalendarMessage");
      if(msg) msg.textContent = rpopT("minNights");
      renderToolbarCalendar();
      return false;
    }
    if(fhReviewOpening) return true;
    fhReviewOpening = true;
    closeToolbarCalendar();
    openReviewPopup(dates).finally(function(){ fhReviewOpening = false; });
    return true;
  }

  function openExistingToolbarSchedule(){
    const opener = visibleOrFirst(toolbarCalendarOpeners());
    if(opener){
      opener.click();
      return true;
    }

    return openToolbarCalendarModal(ensureToolbarCalendarModal());
  }

  function openHeaderSchedule(){
    closeMenu();

    if(openExistingToolbarSchedule()){
      document.documentElement.dataset.fhHeaderScheduleActive = "1";
      return;
    }

    window.location.href = bookingHref;
  }

  document.addEventListener("click", function(event){
    if(document.documentElement.dataset.fhHeaderScheduleActive !== "1") return;
    if(!event.target.closest || !event.target.closest("#fhToolbarCalendarGrid .fh-day[data-date], #fhToolbarCalendarGrid button[data-date]")) return;
    window.setTimeout(function(){
      const dates = pageToolbarDates();
      if(proceedAfterDates(dates)) delete document.documentElement.dataset.fhHeaderScheduleActive;
    }, 160);
  }, true);

  document.addEventListener("keydown", function(event){
    if(event.key !== "Escape") return;
    const rp = document.getElementById("fhReviewPopup");
    if(rp && rp.classList.contains("open")){ closeReviewPopup(); return; }
    closeToolbarCalendar();
  });

  document.addEventListener("click", function(event){
    const book = event.target.closest ? event.target.closest("[data-fh-footbar-book]") : null;
    if(book){ event.preventDefault(); event.stopImmediatePropagation(); openHeaderSchedule(); return; }
    const menuBtn = event.target.closest ? event.target.closest("[data-fh-footbar-menu]") : null;
    if(menuBtn){ event.preventDefault(); event.stopImmediatePropagation(); openMenu(); }
  });

  document.documentElement.dataset.fhFootbarBookBound = "1";

  normalizeBookingLinks();

  document.addEventListener("click", function(event){
    const link = event.target.closest ? event.target.closest("a") : null;
    if(!link) return;

    if(isBookingIntent(link)){
      event.preventDefault();
      event.stopImmediatePropagation();
      openHeaderSchedule();
    }
  }, true);

  window.FHOpenCleanSchedule = openHeaderSchedule;
  window.FHCloseCleanSchedule = closeToolbarCalendar;


  const bookingObserver = new MutationObserver(normalizeBookingLinks);
  bookingObserver.observe(document.documentElement, {
    childList:true,
    subtree:true
  });
})();
</script>
