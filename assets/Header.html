<!-- ==========================================================
Fletschhorn — Global Header + Small Mobile Drawer + Fixed Reserve CTA
Paste in: Squarespace > Settings > Advanced > Code Injection > Footer

Updates:
- Tiny always-visible "Reserve stay" CTA
- Mobile hamburger opens as compact right-side drawer, not full page
- About Us and Booking order switched
- Keeps Guesty / Worker global variables
========================================================== -->

<style>
/* ==========================================================
Fletschhorn Global Header CSS
========================================================== */

:root{
  --fh-cream:#f7f1e8;
  --fh-paper:#fffaf2;
  --fh-ink:#1c1814;
  --fh-muted:rgba(28,24,20,.66);
  --fh-line:rgba(28,24,20,.14);
  --fh-forest:#1f3a2f;
  --fh-forest-2:#2f5141;
  --fh-clay:#b99a7d;
  --fh-white:#fffaf2;
  --fh-shadow:0 18px 60px rgba(20,18,15,.16);
  --fh-soft-shadow:0 12px 34px rgba(20,18,15,.09);
  --fh-serif:Georgia, "Times New Roman", serif;
  --fh-sans:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body.fh-global-shell{
  padding-top:82px;
}

body.fh-hide-sqs-shell header.Header,
body.fh-hide-sqs-shell .Header,
body.fh-hide-sqs-shell footer.Footer,
body.fh-hide-sqs-shell .Footer{
  display:none !important;
}

/* Header */
.fh-global-header{
  position:fixed;
  top:14px;
  left:18px;
  right:18px;
  z-index:9998;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:18px;
  padding:10px 12px 10px 14px;
  border:1px solid rgba(255,250,242,.62);
  border-radius:999px;
  background:rgba(255,250,242,.72);
  backdrop-filter:blur(22px);
  -webkit-backdrop-filter:blur(22px);
  box-shadow:0 12px 40px rgba(28,24,20,.10);
  transition:background .25s ease, box-shadow .25s ease, transform .25s ease;
}

.fh-global-header.is-scrolled{
  background:rgba(255,250,242,.88);
  box-shadow:0 16px 48px rgba(28,24,20,.14);
}

.fh-global-brand{
  display:flex;
  align-items:center;
  gap:12px;
  min-width:0;
  color:var(--fh-ink);
  text-decoration:none;
}

.fh-global-mark{
  width:38px;
  height:38px;
  flex:0 0 38px;
  border-radius:50%;
  display:grid;
  place-items:center;
  overflow:hidden;
  background:rgba(255,255,255,.7);
  border:1px solid rgba(28,24,20,.10);
  font-family:var(--fh-serif);
  font-size:15px;
  font-style:italic;
  color:var(--fh-forest);
  text-transform:lowercase;
}

.fh-global-mark img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.fh-brand-name{
  display:block;
  font-family:var(--fh-serif);
  font-size:20px;
  line-height:1;
  letter-spacing:-.03em;
}

.fh-brand-note{
  display:block;
  margin-top:3px;
  font-family:var(--fh-sans);
  font-size:10px;
  line-height:1.1;
  letter-spacing:.11em;
  text-transform:uppercase;
  color:rgba(28,24,20,.50);
  white-space:nowrap;
}

/* Desktop nav */
.fh-global-nav{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:4px;
  font-family:var(--fh-sans);
}

.fh-global-nav a{
  position:relative;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:36px;
  padding:0 11px;
  border-radius:999px;
  font-size:12px;
  font-weight:650;
  letter-spacing:.02em;
  color:rgba(28,24,20,.72);
  text-decoration:none;
  transition:background .2s ease, color .2s ease, transform .2s ease;
}

.fh-global-nav a:hover{
  background:rgba(31,58,47,.07);
  color:var(--fh-ink);
}

.fh-global-nav a.is-active{
  background:rgba(31,58,47,.10);
  color:var(--fh-forest);
}

.fh-global-nav .fh-global-cta{
  margin-left:6px;
  padding:0 14px;
  background:var(--fh-forest);
  color:var(--fh-white);
  box-shadow:0 10px 26px rgba(31,58,47,.22);
}

.fh-global-nav .fh-global-cta:hover{
  background:var(--fh-forest-2);
  color:var(--fh-white);
  transform:translateY(-1px);
}

/* Tiny always-visible reserve button */
.fh-fixed-reserve{
  position:fixed;
  right:22px;
  bottom:22px;
  z-index:9999;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  height:34px;
  padding:0 14px;
  border-radius:999px;
  border:1px solid rgba(255,250,242,.72);
  background:rgba(31,58,47,.94);
  color:var(--fh-white);
  text-decoration:none;
  font-family:var(--fh-sans);
  font-size:11px;
  font-weight:750;
  letter-spacing:.10em;
  text-transform:uppercase;
  box-shadow:0 14px 34px rgba(20,18,15,.22);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  transition:transform .2s ease, background .2s ease, box-shadow .2s ease;
}

.fh-fixed-reserve:hover{
  transform:translateY(-2px);
  background:var(--fh-forest-2);
  box-shadow:0 18px 42px rgba(20,18,15,.26);
}

/* Mobile toggle */
.fh-mobile-toggle{
  display:none;
  width:40px;
  height:40px;
  border-radius:999px;
  border:1px solid rgba(28,24,20,.12);
  background:rgba(255,255,255,.56);
  cursor:pointer;
  padding:0;
  position:relative;
  flex:0 0 40px;
}

.fh-mobile-toggle span,
.fh-mobile-toggle::before,
.fh-mobile-toggle::after{
  content:"";
  position:absolute;
  left:11px;
  right:11px;
  height:1.5px;
  border-radius:999px;
  background:var(--fh-ink);
  transition:transform .22s ease, opacity .22s ease, top .22s ease;
}

.fh-mobile-toggle span{
  top:19px;
}

.fh-mobile-toggle::before{
  top:14px;
}

.fh-mobile-toggle::after{
  top:24px;
}

.fh-mobile-toggle[aria-expanded="true"] span{
  opacity:0;
}

.fh-mobile-toggle[aria-expanded="true"]::before{
  top:19px;
  transform:rotate(45deg);
}

.fh-mobile-toggle[aria-expanded="true"]::after{
  top:19px;
  transform:rotate(-45deg);
}

/* Compact mobile drawer */
.fh-mobile-menu{
  position:fixed;
  inset:0;
  z-index:9997;
  pointer-events:none;
  opacity:0;
  transition:opacity .22s ease;
}

.fh-mobile-menu::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(28,24,20,.12);
  backdrop-filter:blur(3px);
  -webkit-backdrop-filter:blur(3px);
}

.fh-mobile-menu.is-open{
  pointer-events:auto;
  opacity:1;
}

.fh-mobile-panel{
  position:absolute;
  top:76px;
  right:18px;
  width:min(420px, calc(100vw - 36px));
  max-height:calc(100vh - 104px);
  overflow:auto;
  border-radius:24px;
  border:1px solid rgba(255,250,242,.68);
  background:rgba(255,250,242,.94);
  box-shadow:0 24px 70px rgba(28,24,20,.22);
  backdrop-filter:blur(22px);
  -webkit-backdrop-filter:blur(22px);
  transform:translateY(-10px) scale(.98);
  opacity:0;
  transition:transform .22s ease, opacity .22s ease;
}

.fh-mobile-menu.is-open .fh-mobile-panel{
  transform:translateY(0) scale(1);
  opacity:1;
}

.fh-mobile-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  padding:16px 16px 10px;
  border-bottom:1px solid rgba(28,24,20,.10);
}

.fh-mobile-title{
  display:block;
  font-family:var(--fh-serif);
  font-size:20px;
  line-height:1;
  color:var(--fh-ink);
}

.fh-mobile-subtitle{
  display:block;
  margin-top:4px;
  font-family:var(--fh-sans);
  font-size:10px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:rgba(28,24,20,.48);
}

.fh-mobile-close{
  width:34px;
  height:34px;
  border-radius:999px;
  border:1px solid rgba(28,24,20,.12);
  background:rgba(255,255,255,.68);
  color:var(--fh-ink);
  cursor:pointer;
  font-size:18px;
  line-height:1;
}

.fh-mobile-links{
  display:grid;
  gap:8px;
  padding:12px;
}

.fh-mobile-links a{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:18px;
  padding:13px 14px;
  border-radius:17px;
  color:var(--fh-ink);
  text-decoration:none;
  background:rgba(255,255,255,.34);
  border:1px solid rgba(28,24,20,.06);
  transition:background .18s ease, transform .18s ease;
}

.fh-mobile-links a:hover{
  background:rgba(31,58,47,.07);
  transform:translateY(-1px);
}

.fh-mobile-links a.is-active{
  background:rgba(31,58,47,.10);
  border-color:rgba(31,58,47,.16);
}

.fh-mobile-links strong{
  display:block;
  font-family:var(--fh-serif);
  font-size:18px;
  font-weight:400;
  line-height:1.05;
}

.fh-mobile-links small{
  display:block;
  margin-top:4px;
  font-family:var(--fh-sans);
  font-size:12px;
  line-height:1.35;
  color:rgba(28,24,20,.58);
}

.fh-mobile-links em{
  font-style:normal;
  color:rgba(28,24,20,.44);
}

.fh-mobile-reserve{
  margin:0 12px 12px;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:42px;
  border-radius:999px;
  background:var(--fh-forest);
  color:var(--fh-white);
  text-decoration:none;
  font-family:var(--fh-sans);
  font-size:11px;
  font-weight:800;
  letter-spacing:.12em;
  text-transform:uppercase;
  box-shadow:0 12px 30px rgba(31,58,47,.22);
}

/* Responsive */
@media (max-width:1020px){
  .fh-brand-note{
    display:none;
  }

  .fh-global-nav a{
    padding:0 8px;
  }
}

@media (max-width:880px){
  body.fh-global-shell{
    padding-top:76px;
  }

  .fh-global-header{
    top:12px;
    left:12px;
    right:12px;
    padding:8px 8px 8px 10px;
  }

  .fh-global-nav{
    display:none;
  }

  .fh-mobile-toggle{
    display:block;
  }

  .fh-global-mark{
    width:34px;
    height:34px;
    flex-basis:34px;
  }

  .fh-brand-name{
    font-size:18px;
  }

  .fh-fixed-reserve{
    right:14px;
    bottom:14px;
    height:32px;
    padding:0 12px;
    font-size:10px;
    letter-spacing:.09em;
  }
}

@media (max-width:480px){
  .fh-mobile-panel{
    top:70px;
    right:10px;
    width:calc(100vw - 20px);
    border-radius:21px;
  }

  .fh-mobile-links a{
    padding:12px;
  }

  .fh-mobile-links strong{
    font-size:17px;
  }

  .fh-mobile-links small{
    font-size:11.5px;
  }
}
</style>

<script>
(function(){

  const FH_WORKER_BASE = "https://fletschhorn-guesty-api.bookings-e2d.workers.dev";
  const FH_INQUIRY_ENDPOINT = FH_WORKER_BASE.replace(/\/$/, "") + "/api/inquiry";

  window.FH_WORKER_BASE = FH_WORKER_BASE;
  window.FH_WORKER_ENDPOINT = FH_WORKER_BASE;
  window.FH_INQUIRY_ENDPOINT = FH_INQUIRY_ENDPOINT;
  window.CLOUDFLARE_INQUIRY_ENDPOINT = FH_INQUIRY_ENDPOINT;

  const HIDE_SQUARESPACE_NATIVE_HEADER_FOOTER = true;

  const FH_PAGES = [
    {
      key: "home",
      label: "Home",
      short: "Home",
      href: "index.html",
      note: "Start with the house, setting, and inquiry.",
      match: ["/", "/index.html", "/home", "/Home"]
    },
    {
      key: "property",
      label: "The Property",
      short: "Property",
      href: "Property.html",
      note: "The property, rooms, spa, amenities, dining and kitchen.",
      match: ["/Property.html", "/property.html", "/property"]
    },
    {
      key: "experiences",
      label: "Experiences",
      short: "Experiences",
      href: "Experiences.html",
      note: "What to do in Saas-Fee and around the property.",
      match: ["/Experiences.html", "/experiences.html", "/experiences"]
    },
    {
      key: "events",
      label: "Wedding & Events",
      short: "Events",
      href: "Wedding-event.html",
      note: "Weddings, private events, retreats, and celebrations.",
      match: ["/Wedding-event.html", "/wedding-event.html", "/wedding-and-events", "/events"]
    },
    {
      key: "location",
      label: "Location",
      short: "Location",
      href: "Location.html",
      note: "Where Fletschhorn is located and what surrounds it.",
      match: ["/Location.html", "/location.html", "/location"]
    },
    {
      key: "about",
      label: "About Us",
      short: "About",
      href: "About-us.html",
      note: "Story, history, and the private-house direction.",
      match: ["/About-us.html", "/about-us.html", "/about"]
    },
    {
      key: "booking",
      label: "Booking",
      short: "Booking",
      href: "booking.html",
      note: "Send an inquiry and plan your stay or event.",
      match: ["/Booking.html", "/booking.html", "/booking"]
    }
  ];

  function normalizePath(path){
    let clean = (path || "/")
      .split("?")[0]
      .split("#")[0]
      .replace(/\/+/g, "/");

    if(clean.length > 1) clean = clean.replace(/\/$/, "");
    return clean || "/";
  }

  function currentPageKey(){
    const bodyPage = document.querySelector("[data-fh-page], [data-page]");
    const explicit = bodyPage && (
      bodyPage.getAttribute("data-fh-page") ||
      bodyPage.getAttribute("data-page")
    );

    if(explicit){
      const key = explicit.toLowerCase();

      if(key.includes("booking")) return "booking";
      if(key.includes("event") || key.includes("wedding")) return "events";
      if(key.includes("experience")) return "experiences";
      if(key.includes("property")) return "property";
      if(key.includes("location")) return "location";
      if(key.includes("about")) return "about";
      if(key.includes("home") || key.includes("index")) return "home";
    }

    const ids = [
      "fh-home",
      "fh-property",
      "fh-experiences",
      "fh-events",
      "fh-location",
      "fh-booking",
      "fh-about"
    ];

    for(const id of ids){
      if(document.getElementById(id)){
        return id.replace("fh-", "");
      }
    }

    const path = normalizePath(window.location.pathname).toLowerCase();

    const found = FH_PAGES.find(page =>
      page.match.some(match => normalizePath(match).toLowerCase() === path)
    );

    return found ? found.key : "home";
  }

  function makeHeader(activeKey){
    const navLinks = FH_PAGES.map(page => `
      <a href="${page.href}" class="${page.key === activeKey ? "is-active" : ""}" data-fh-page-link="${page.key}">
        ${page.short}
      </a>
    `).join("");

    return `
      <header class="fh-global-header" id="fhGlobalHeader">
        <a class="fh-global-brand" href="index.html" aria-label="Fletschhorn home">
          <span class="fh-global-mark">
            <img src="assets/Saas-Fee-Logo.jpeg" alt="Fletschhorn" onerror="this.style.display='none'; this.parentElement.textContent='fh';" />
          </span>
          <span>
            <span class="fh-brand-name">Fletschhorn</span>
            <span class="fh-brand-note">Private alpine house · Saas-Fee</span>
          </span>
        </a>

        <nav class="fh-global-nav" aria-label="Primary navigation">
          ${navLinks}
          <a class="fh-global-cta" href="Booking.html" data-fh-booking-link>Reserve</a>
        </nav>

        <button class="fh-mobile-toggle" type="button" id="fhMobileToggle" aria-expanded="false" aria-controls="fhMobileMenu" aria-label="Open menu">
          <span></span>
        </button>
      </header>
    `;
  }

  function makeMobileMenu(activeKey){
    const links = FH_PAGES.map(page => `
      <a href="${page.href}" class="${page.key === activeKey ? "is-active" : ""}">
        <span>
          <strong>${page.label}</strong>
          <small>${page.note}</small>
        </span>
        <em>→</em>
      </a>
    `).join("");

    return `
      <div class="fh-mobile-menu" id="fhMobileMenu" aria-hidden="true">
        <div class="fh-mobile-panel" role="dialog" aria-label="Fletschhorn navigation">
          <div class="fh-mobile-top">
            <span>
              <span class="fh-mobile-title">Fletschhorn</span>
              <span class="fh-mobile-subtitle">Private alpine house</span>
            </span>
            <button class="fh-mobile-close" type="button" id="fhMobileClose" aria-label="Close menu">×</button>
          </div>

          <div class="fh-mobile-links">
            ${links}
          </div>

          <a class="fh-mobile-reserve" href="Booking.html" data-fh-booking-link>Reserve stay</a>
        </div>
      </div>
    `;
  }

  function makeFixedReserve(){
    return `
      <a class="fh-fixed-reserve" href="Booking.html" data-fh-booking-link aria-label="Reserve your stay">
        Reserve stay
      </a>
    `;
  }

  function syncHeaderLanguageClicks(){
    document.querySelectorAll("[data-fh-lang], [data-lang], [data-language]").forEach(btn => {
      btn.addEventListener("click", () => {
        const lang =
          btn.getAttribute("data-fh-lang") ||
          btn.getAttribute("data-lang") ||
          btn.getAttribute("data-language");

        if(!lang) return;

        try{
          localStorage.setItem("fh_lang", lang);
        }catch(error){}

        document.documentElement.setAttribute("lang", lang);
        document.body.setAttribute("data-fh-lang", lang);

        window.dispatchEvent(new CustomEvent("fh:language-change", {
          detail: { lang }
        }));
      });
    });
  }

  function preserveBookingLanguage(){
    const storedLang = (() => {
      try{
        return localStorage.getItem("fh_lang") || "";
      }catch(error){
        return "";
      }
    })();

    const currentLang =
      document.body.getAttribute("data-fh-lang") ||
      document.documentElement.getAttribute("lang") ||
      storedLang ||
      "en";

    document.querySelectorAll("[data-fh-booking-link]").forEach(link => {
      link.addEventListener("click", () => {
        try{
          localStorage.setItem("fh_lang", currentLang);
        }catch(error){}
      });
    });
  }

  function init(){
    if(document.getElementById("fhGlobalHeader")) return;

    const activeKey = currentPageKey();

    document.body.classList.add("fh-global-shell");
    document.body.classList.add("fh-github-version");

    if(HIDE_SQUARESPACE_NATIVE_HEADER_FOOTER){
      document.body.classList.add("fh-hide-sqs-shell");
    }

    document.body.insertAdjacentHTML("afterbegin", makeMobileMenu(activeKey));
    document.body.insertAdjacentHTML("afterbegin", makeHeader(activeKey));

    if(!document.querySelector(".fh-fixed-reserve")){
      document.body.insertAdjacentHTML("beforeend", makeFixedReserve());
    }

    const header = document.getElementById("fhGlobalHeader");
    const toggle = document.getElementById("fhMobileToggle");
    const menu = document.getElementById("fhMobileMenu");
    const panel = menu ? menu.querySelector(".fh-mobile-panel") : null;
    const closeButton = document.getElementById("fhMobileClose");

    function onScroll(){
      if(!header) return;
      header.classList.toggle("is-scrolled", window.scrollY > 20);
    }

    function closeMenu(){
      if(!toggle || !menu) return;

      toggle.setAttribute("aria-expanded", "false");
      menu.setAttribute("aria-hidden", "true");
      menu.classList.remove("is-open");
      document.documentElement.classList.remove("fh-nav-open");
    }

    function openMenu(){
      if(!toggle || !menu) return;

      toggle.setAttribute("aria-expanded", "true");
      menu.setAttribute("aria-hidden", "false");
      menu.classList.add("is-open");
      document.documentElement.classList.add("fh-nav-open");
    }

    if(toggle && menu){
      toggle.addEventListener("click", () => {
        const isOpen = toggle.getAttribute("aria-expanded") === "true";
        isOpen ? closeMenu() : openMenu();
      });

      if(closeButton){
        closeButton.addEventListener("click", closeMenu);
      }

      menu.querySelectorAll("a").forEach(a => {
        a.addEventListener("click", closeMenu);
      });

      menu.addEventListener("click", event => {
        if(panel && !panel.contains(event.target)){
          closeMenu();
        }
      });

      document.addEventListener("keydown", event => {
        if(event.key === "Escape") closeMenu();
      });
    }

    syncHeaderLanguageClicks();
    preserveBookingLanguage();

    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();
  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", init);
  }else{
    init();
  }

})();
</script>
