<!-- Fletschhorn Global Header -->

<style>
.fh-header-book-now{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:34px;
  padding:0 13px;
  border-radius:999px;
  background:rgba(31,58,47,.94);
  color:#fffaf2 !important;
  border:1px solid rgba(255,250,242,.45);
  box-shadow:0 10px 26px rgba(31,58,47,.18);
  font-size:11px;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  text-decoration:none !important;
  white-space:nowrap;
}

.fh-mobile-book-now{
  display:none !important;
}

/* Global language toolbar — always under header */
.fh-global-lang-switch{
  position:fixed;
  z-index:9996;
  top:92px; 
  left:50%;
  transform:translateX(-50%);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:5px;
  padding:5px;
  border-radius:999px;
  border:1px solid rgba(28,24,20,.10);
  background:rgba(255,250,242,.78);
  box-shadow:0 10px 28px rgba(20,16,12,.08);
  -webkit-backdrop-filter:blur(14px);
  backdrop-filter:blur(14px);
}

.fh-global-lang-switch button{
  border:0;
  background:transparent;
  color:rgba(28,24,20,.58);
  min-height:28px;
  padding:0 9px;
  border-radius:999px;
  font-size:9px;
  line-height:1;
  text-transform:uppercase;
  letter-spacing:.09em;
  font-weight:850;
  cursor:pointer;
}

.fh-global-lang-switch button.active{
  background:rgba(31,58,47,.92);
  color:#fffaf2;
}

@media(max-width:880px){
  .fh-global-header{
    top:8px !important;
    left:8px !important;
    right:8px !important;
    min-height:54px !important;
    padding:8px 9px 8px 10px !important;
    border-radius:22px !important;
    gap:7px !important;
  }

  .fh-global-brand{
    gap:8px !important;
    min-width:0 !important;
    flex:1 1 auto !important;
  }

  .fh-global-mark{
    width:34px !important;
    height:34px !important;
    flex:0 0 34px !important;
  }

  .fh-brand-name{
    font-size:14px !important;
    letter-spacing:.03em !important;
    line-height:1 !important;
  }

  .fh-brand-note{
    font-size:8.5px !important;
    line-height:1.1 !important;
    letter-spacing:.08em !important;
    max-width:128px !important;
    white-space:nowrap !important;
    overflow:hidden !important;
    text-overflow:ellipsis !important;
  }

  .fh-global-nav{
    display:none !important;
  }

  .fh-global-nav .fh-header-book-now{
    display:none !important;
  }

  .fh-mobile-book-now{
    display:inline-flex !important;
    margin-left:auto;
    min-height:30px;
    padding:0 10px;
    font-size:9.5px;
    letter-spacing:.07em;
    flex:0 0 auto;
  }

  .fh-mobile-toggle{
    display:flex !important;
    align-items:center !important;
    justify-content:center !important;
    width:34px !important;
    height:34px !important;
    flex:0 0 34px !important;
    border-radius:999px !important;
  }

  .fh-mobile-menu{
    position:fixed !important;
    inset:0 !important;
    z-index:9997 !important;
    opacity:0 !important;
    pointer-events:none !important;
    background:rgba(28,24,20,.14) !important;
    backdrop-filter:blur(4px) !important;
    -webkit-backdrop-filter:blur(4px) !important;
    transition:opacity .22s ease !important;
  }

  .fh-mobile-menu.is-open{
    opacity:1 !important;
    pointer-events:auto !important;
  }

  .fh-mobile-panel{
    position:absolute !important;
    top:68px !important;
    right:10px !important;
    left:auto !important;
    bottom:auto !important;
    width:min(340px,calc(100vw - 20px)) !important;
    height:auto !important;
    max-height:calc(100vh - 88px) !important;
    overflow:auto !important;
    border-radius:22px !important;
    transform:translateY(-8px) scale(.98) !important;
    opacity:0 !important;
    transition:transform .22s ease, opacity .22s ease !important;
  }

  .fh-mobile-menu.is-open .fh-mobile-panel{
    transform:translateY(0) scale(1) !important;
    opacity:1 !important;
  }

  .fh-mobile-links{
    padding:10px !important;
  }

  .fh-mobile-links a{
    padding:12px 13px !important;
    border-radius:16px !important;
  }

  .fh-mobile-links strong{
    font-size:13px !important;
  }

  .fh-mobile-links small{
    font-size:11px !important;
    line-height:1.35 !important;
  }

  html.fh-nav-open,
  html.fh-nav-open body{
    overflow:auto !important;
  }

  .fh-global-lang-switch{
    top:68px;
    right:10px;
    left:auto;
    transform:none;
    gap:1px;
    padding:3px;
    opacity:.76;
  }

  .fh-global-lang-switch:hover,
  .fh-global-lang-switch:focus-within{
    opacity:1;
  }

  .fh-global-lang-switch button{
    min-height:26px;
    padding:0 7px;
    font-size:8px;
    letter-spacing:.08em;
  }
}

@media(max-width:430px){
  .fh-global-header{
    min-height:50px !important;
    padding:7px 8px !important;
    border-radius:19px !important;
  }

  .fh-global-mark{
    width:31px !important;
    height:31px !important;
    flex-basis:31px !important;
  }

  .fh-brand-note{
    display:none !important;
  }

  .fh-mobile-book-now{
    min-height:28px;
    padding:0 8px;
    font-size:9px;
  }

  .fh-mobile-toggle{
    width:31px !important;
    height:31px !important;
    flex-basis:31px !important;
  }

  .fh-mobile-panel{
    top:62px !important;
    right:8px !important;
    width:calc(100vw - 16px) !important;
    border-radius:20px !important;
  }

  .fh-global-lang-switch{
    top:61px;
    right:8px;
  }

  .fh-global-lang-switch button{
    min-height:24px;
    padding:0 6px;
    font-size:7.5px;
  }
}
</style>

<script>
(function(){
  if(document.getElementById("fhGlobalHeader")) return;

  const FH_SITE_BASE = "https://lschacht99.github.io/Fletschhorn-berry/";

  function page(file){
    return FH_SITE_BASE + file.replace(/^\/+/, "");
  }

  const bookingHref = page("booking.html");

  const NAV_TEXT = {
    en:{
      home:"Home",             homeLabel:"Home",             homeNote:"Start with the house, setting, and inquiry.",
      property:"Property",     propertyLabel:"The Property",  propertyNote:"The spaces, rooms, amenities, dining, and kitchen.",
      experiences:"Experiences",experiencesLabel:"Experiences",experiencesNote:"What to do in Saas-Fee and around the property.",
      location:"Location",     locationLabel:"Location",      locationNote:"Where Fletschhorn is located.",
      events:"Events",         eventsLabel:"Wedding & Events",eventsNote:"Weddings, private events, retreats, and celebrations.",
      about:"About",           aboutLabel:"About Us",         aboutNote:"Story, history, and the private-house direction.",
      bookNow:"Book Now",      bookNowNote:"Go directly to the booking page to complete your stay request.",
      brandNote:"Private alpine house · Saas-Fee"
    },
    fr:{
      home:"Accueil",          homeLabel:"Accueil",                  homeNote:"Découvrez la maison, le cadre et la procédure de demande.",
      property:"Propriété",    propertyLabel:"La propriété",         propertyNote:"Les espaces, chambres, équipements, restauration et cuisine.",
      experiences:"Expériences",experiencesLabel:"Expériences",      experiencesNote:"Les activités à Saas-Fee et autour de la propriété.",
      location:"Emplacement",  locationLabel:"Emplacement",          locationNote:"L'emplacement du Fletschhorn.",
      events:"Événements",     eventsLabel:"Mariage & Événements",   eventsNote:"Mariages, événements privés, retraites et célébrations.",
      about:"À propos",        aboutLabel:"À propos",                aboutNote:"L'histoire et la direction de la maison privée.",
      bookNow:"Réserver",      bookNowNote:"Accédez directement à la page de réservation pour finaliser votre séjour.",
      brandNote:"Maison alpine privée · Saas-Fee"
    },
    de:{
      home:"Startseite",       homeLabel:"Startseite",               homeNote:"Starten Sie mit dem Haus, der Umgebung und der Anfrage.",
      property:"Das Haus",     propertyLabel:"Das Haus",             propertyNote:"Räume, Zimmer, Ausstattung, Speisen und Küche.",
      experiences:"Erlebnisse",experiencesLabel:"Erlebnisse",        experiencesNote:"Aktivitäten in Saas-Fee und rund um die Unterkunft.",
      location:"Lage",         locationLabel:"Lage",                 locationNote:"Der Standort des Fletschhorn.",
      events:"Events",         eventsLabel:"Hochzeit & Events",      eventsNote:"Hochzeiten, private Events, Retreats und Feiern.",
      about:"Über uns",        aboutLabel:"Über uns",                aboutNote:"Geschichte und die Ausrichtung als Privathaus.",
      bookNow:"Buchen",        bookNowNote:"Direkt zur Buchungsseite, um den Aufenthalt abzuschließen.",
      brandNote:"Privates Alpenhaus · Saas-Fee"
    },
    ru:{
      home:"Главная",          homeLabel:"Главная",                  homeNote:"Познакомьтесь с домом, атмосферой и процессом запроса.",
      property:"Объект",       propertyLabel:"Объект",               propertyNote:"Пространства, комнаты, удобства, питание и кухня.",
      experiences:"Впечатления",experiencesLabel:"Впечатления",      experiencesNote:"Чем заняться в Саас-Фе и вокруг объекта.",
      location:"Расположение", locationLabel:"Расположение",         locationNote:"Где находится Fletschhorn.",
      events:"События",        eventsLabel:"Свадьба и события",      eventsNote:"Свадьбы, частные мероприятия, ретриты и торжества.",
      about:"О нас",           aboutLabel:"О нас",                   aboutNote:"История и направление частного дома.",
      bookNow:"Забронировать", bookNowNote:"Перейти на страницу бронирования для завершения запроса.",
      brandNote:"Частный горный дом · Саас-Фе"
    },
    he:{
      home:"בית",              homeLabel:"בית",                      homeNote:"גלו את הבית, הסביבה ותהליך הפנייה.",
      property:"נכס",          propertyLabel:"הנכס",                 propertyNote:"החללים, החדרים, השירותים, האוכל והמטבח.",
      experiences:"חוויות",    experiencesLabel:"חוויות",            experiencesNote:"מה לעשות בסאס-פה ובסביבת הנכס.",
      location:"מיקום",        locationLabel:"מיקום",                locationNote:"איפה נמצא Fletschhorn.",
      events:"אירועים",        eventsLabel:"חתונות ואירועים",        eventsNote:"חתונות, אירועים פרטיים, ריטריטים וחגיגות.",
      about:"אודות",           aboutLabel:"אודותינו",                aboutNote:"היסטוריה וכיוון הבית הפרטי.",
      bookNow:"הזמינו",        bookNowNote:"עברו ישירות לעמוד ההזמנה להשלמת בקשת השהייה.",
      brandNote:"בית אלפיני פרטי · סאס-פה"
    }
  };

  function getNavBundle(lang){
    return NAV_TEXT[lang] || NAV_TEXT.en;
  }

  const pages = [
    {
      key:"home",
      label:"Home",
      short:"Home",
      href:page("index.html"),
      note:"Start with the house, setting, and inquiry."
    },
    {
      key:"property",
      label:"The Property",
      short:"Property",
      href:page("Property.html"),
      note:"The spaces, rooms, amenities, dining, and kitchen."
    },
    {
      key:"experiences",
      label:"Experiences",
      short:"Experiences",
      href:page("Experiences.html"),
      note:"What to do in Saas-Fee and around the property."
    },
    {
      key:"location",
      label:"Location",
      short:"Location",
      href:page("Location.html"),
      note:"Where Fletschhorn is located."
    },
    {
      key:"events",
      label:"Wedding & Events",
      short:"Events",
      href:page("Wedding-event.html"),
      note:"Weddings, private events, retreats, and celebrations."
    },
    {
      key:"about",
      label:"About Us",
      short:"About",
      href:page("About-us.html"),
      note:"Story, history, and the private-house direction."
    }
  ];

  function activeKey(){
    const path = window.location.pathname.toLowerCase();

    if(path.includes("property")) return "property";
    if(path.includes("experiences")) return "experiences";
    if(path.includes("location")) return "location";
    if(path.includes("wedding")) return "events";
    if(path.includes("about")) return "about";
    if(path.includes("booking")) return "booking";

    return "home";
  }

  const active = activeKey();

  const navLinks = pages.map(item => `
    <a href="${item.href}" class="${active === item.key ? "is-active" : ""}">
      <span data-fh-nav-short="${item.key}">${item.short}</span>
    </a>
  `).join("");

  const mobileLinks = pages.map(item => `
    <a href="${item.href}" class="${active === item.key ? "is-active" : ""}">
      <span>
        <strong data-fh-nav-label="${item.key}">${item.label}</strong>
        <small data-fh-nav-note="${item.key}">${item.note}</small>
      </span>
      <em>→</em>
    </a>
  `).join("");

  document.body.classList.add("fh-global-shell", "fh-github-version");

  document.body.insertAdjacentHTML("afterbegin", `
    <div class="fh-mobile-menu" id="fhMobileMenu" aria-hidden="true">
      <div class="fh-mobile-panel">
        <div class="fh-mobile-links">
          ${mobileLinks}
          <a href="${bookingHref}" class="${active === "booking" ? "is-active" : ""}" data-fh-booking-link="true">
            <span>
              <strong data-fh-book-label>Book Now</strong>
              <small data-fh-book-note>Go directly to the booking page to complete your stay request.</small>
            </span>
            <em>→</em>
          </a>
        </div>
      </div>
    </div>

    <header class="fh-global-header" id="fhGlobalHeader">
      <a class="fh-global-brand" href="${page("index.html")}" aria-label="Fletschhorn home">
        <span class="fh-global-mark">
          <img src="${page("assets/Saas-Fee-Logo.jpeg")}" alt="Fletschhorn" onerror="this.style.display='none';this.parentElement.textContent='fh';">
        </span>
        <span>
          <span class="fh-brand-name">Fletschhorn</span>
          <span class="fh-brand-note" data-fh-brand-note>Private alpine house · Saas-Fee</span>
        </span>
      </a>

      <nav class="fh-global-nav" aria-label="Primary navigation">
        ${navLinks}
        <a class="fh-global-cta fh-header-book-now" href="${bookingHref}" data-fh-booking-link="true"><span data-fh-book-btn>Book Now</span></a>
      </nav>

      <a class="fh-header-book-now fh-mobile-book-now" href="${bookingHref}" aria-label="Book your stay" data-fh-booking-link="true">
        <span data-fh-book-btn>Book Now</span>
      </a>

      <button class="fh-mobile-toggle" type="button" id="fhMobileToggle" aria-expanded="false" aria-controls="fhMobileMenu" aria-label="Open menu">
        <span></span>
      </button>
    </header>

    <div class="fh-global-lang-switch" role="group" aria-label="Language">
      <button type="button" data-lang="en">EN</button>
      <button type="button" data-lang="fr">FR</button>
      <button type="button" data-lang="de">DE</button>
      <button type="button" data-lang="ru">RU</button>
      <button type="button" data-lang="he">HE</button>
    </div>
  `);

  const header = document.getElementById("fhGlobalHeader");
  const toggle = document.getElementById("fhMobileToggle");
  const menu = document.getElementById("fhMobileMenu");
  const panel = menu ? menu.querySelector(".fh-mobile-panel") : null;

  function closeMenu(){
    if(!toggle || !menu) return;
    toggle.setAttribute("aria-expanded", "false");
    menu.setAttribute("aria-hidden", "true");
    menu.classList.remove("is-open");
    document.documentElement.classList.remove("fh-nav-open");
  }

  function openMenu(){
    if(!toggle || !menu) return;
    toggle.setAttribute("aria-expanded", "true");
    menu.setAttribute("aria-hidden", "false");
    menu.classList.add("is-open");
    document.documentElement.classList.add("fh-nav-open");
  }

  if(toggle && menu){
    toggle.addEventListener("click", function(){
      const isOpen = toggle.getAttribute("aria-expanded") === "true";
      isOpen ? closeMenu() : openMenu();
    });

    menu.querySelectorAll("a").forEach(function(link){
      link.addEventListener("click", closeMenu);
    });

    menu.addEventListener("click", function(event){
      if(panel && !panel.contains(event.target)){
        closeMenu();
      }
    });

    document.addEventListener("keydown", function(event){
      if(event.key === "Escape") closeMenu();
    });
  }

  function onScroll(){
    if(!header) return;
    header.classList.toggle("is-scrolled", window.scrollY > 20);
  }

  window.addEventListener("scroll", onScroll, {passive:true});
  onScroll();

  /*
    Global language toolbar:
    - always appears under the header
    - uses fh_lang localStorage
    - calls the page-level language function when available
    - does not create a second translation system
  */
  const globalLangSwitch = document.querySelector(".fh-global-lang-switch");

  function cleanLang(lang){
    return ["en","fr","de","ru","he"].includes(lang) ? lang : "en";
  }

  function getStoredFhLang(){
    try {
      return cleanLang(localStorage.getItem("fh_lang") || "en");
    } catch(error) {
      return "en";
    }
  }

  function setGlobalLangActive(lang){
    const selectedLang = cleanLang(lang);

    document.querySelectorAll(".fh-global-lang-switch button").forEach(function(btn){
      btn.classList.toggle("active", btn.getAttribute("data-lang") === selectedLang);
    });

    document.documentElement.setAttribute("lang", selectedLang);
    document.documentElement.setAttribute("dir", selectedLang === "he" ? "rtl" : "ltr");

    try {
      localStorage.setItem("fh_lang", selectedLang);
    } catch(error) {}
  }

  function updateHeaderLang(lang){
    const bundle = getNavBundle(lang);

    document.querySelectorAll("[data-fh-nav-short]").forEach(function(el){
      const key = el.getAttribute("data-fh-nav-short");
      if(bundle[key]) el.textContent = bundle[key];
    });

    document.querySelectorAll("[data-fh-nav-label]").forEach(function(el){
      const key = el.getAttribute("data-fh-nav-label");
      const labelKey = key + "Label";
      if(bundle[labelKey]) el.textContent = bundle[labelKey];
    });

    document.querySelectorAll("[data-fh-nav-note]").forEach(function(el){
      const key = el.getAttribute("data-fh-nav-note");
      const noteKey = key + "Note";
      if(bundle[noteKey]) el.textContent = bundle[noteKey];
    });

    document.querySelectorAll("[data-fh-book-btn]").forEach(function(el){
      el.textContent = bundle.bookNow;
    });

    document.querySelectorAll("[data-fh-book-label]").forEach(function(el){
      el.textContent = bundle.bookNow;
    });

    document.querySelectorAll("[data-fh-book-note]").forEach(function(el){
      el.textContent = bundle.bookNowNote;
    });

    document.querySelectorAll("[data-fh-brand-note]").forEach(function(el){
      el.textContent = bundle.brandNote;
    });
  }

  function applyGlobalLanguage(lang){
    const selectedLang = cleanLang(lang);

    setGlobalLangActive(selectedLang);
    updateHeaderLang(selectedLang);

    if(typeof window.setFletschhornLanguage === "function"){
      window.setFletschhornLanguage(selectedLang);
      return;
    }

    if(typeof window.FHSetLanguage === "function"){
      window.FHSetLanguage(selectedLang);
      return;
    }

    window.dispatchEvent(new CustomEvent("fh-language-change", {
      detail:{ lang:selectedLang }
    }));
  }

  if(globalLangSwitch){
    const initialLang = getStoredFhLang();
    setGlobalLangActive(initialLang);
    updateHeaderLang(initialLang);

    globalLangSwitch.querySelectorAll("button[data-lang]").forEach(function(btn){
      btn.addEventListener("click", function(){
        applyGlobalLanguage(btn.getAttribute("data-lang"));
      });
    });

    /*
      Some pages define their translation function after the header loads.
      This delayed call makes the global toolbar apply the stored language
      once the page script is ready.
    */
    window.setTimeout(function(){
      applyGlobalLanguage(getStoredFhLang());
    }, 120);
  }

  /*
    Booking safety rule:
    Any visible button/link that clearly says Book Now, Booking, Reserve, or Book your stay
    will always go to /booking.html, not to #booking, #book, a page section, or another page anchor.
  */
  function isBookingIntent(link){
    if(!link) return false;

    const text = (link.textContent || "").trim().toLowerCase();
    const aria = (link.getAttribute("aria-label") || "").trim().toLowerCase();
    const href = (link.getAttribute("href") || "").trim().toLowerCase();

    if(link.hasAttribute("data-fh-booking-link")) return true;

    return (
      text === "book now" ||
      text === "booking" ||
      text.includes("book your stay") ||
      text.includes("reserve") ||
      aria.includes("book") ||
      href === "#book" ||
      href === "#booking" ||
      href.includes("contact-booking")
    );
  }

  function normalizeBookingLinks(){
    document.querySelectorAll("a").forEach(function(link){
      const href = (link.getAttribute("href") || "").trim().toLowerCase();

      if(href.startsWith("mailto:") || href.startsWith("tel:")) return;

      if(isBookingIntent(link)){
        link.setAttribute("href", bookingHref);
        link.setAttribute("data-fh-booking-link", "true");
      }
    });
  }

  normalizeBookingLinks();

  document.addEventListener("click", function(event){
    const link = event.target.closest ? event.target.closest("a") : null;
    if(!link) return;

    if(isBookingIntent(link)){
      event.preventDefault();
      window.location.href = bookingHref;
    }
  }, true);

  const bookingObserver = new MutationObserver(normalizeBookingLinks);
  bookingObserver.observe(document.documentElement, {
    childList:true,
    subtree:true
  });
})();
</script>
