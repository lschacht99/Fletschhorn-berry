<!-- ==========================================================
Fletschhorn — Global Header Only
Paste in: Squarespace > Settings > Advanced > Code Injection > Footer
Includes compact mobile drawer + always-visible Reserve CTA.
========================================================== -->

<style>
  :root{
    --fh-header-cream:#f7f1e8;
    --fh-header-paper:#fffaf2;
    --fh-header-ink:#1c1814;
    --fh-header-muted:rgba(28,24,20,.62);
    --fh-header-line:rgba(28,24,20,.14);
    --fh-header-forest:#1f3a2f;
    --fh-header-forest2:#2f5141;
    --fh-header-shadow:0 18px 54px rgba(27,23,18,.14);
  }

  body.fh-hide-sqs-shell header.Header,
  body.fh-hide-sqs-shell footer.Footer,
  body.fh-hide-sqs-shell .Header,
  body.fh-hide-sqs-shell .Footer{
    display:none !important;
  }

  .fh-global-header{
    position:fixed;
    top:14px;
    left:50%;
    transform:translateX(-50%);
    z-index:99990;
    width:min(1180px, calc(100vw - 28px));
    min-height:64px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:18px;
    padding:10px 12px 10px 14px;
    border:1px solid rgba(28,24,20,.12);
    border-radius:999px;
    background:rgba(255,250,242,.82);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    box-shadow:0 10px 34px rgba(27,23,18,.10);
    transition:box-shadow .25s ease, background .25s ease, top .25s ease;
  }

  .fh-global-header.is-scrolled{
    top:10px;
    background:rgba(255,250,242,.94);
    box-shadow:var(--fh-header-shadow);
  }

  .fh-global-brand{
    display:flex;
    align-items:center;
    gap:10px;
    min-width:0;
    color:var(--fh-header-ink);
    text-decoration:none !important;
  }

  .fh-global-mark{
    width:42px;
    height:42px;
    border-radius:50%;
    overflow:hidden;
    display:grid;
    place-items:center;
    flex:0 0 auto;
    background:#fff;
    border:1px solid rgba(28,24,20,.12);
    font-family:Georgia, serif;
    font-size:13px;
    letter-spacing:.08em;
    text-transform:uppercase;
  }

  .fh-global-mark img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .fh-brand-name{
    display:block;
    font-family:Georgia, "Times New Roman", serif;
    font-size:18px;
    line-height:1;
    letter-spacing:.02em;
    color:var(--fh-header-ink);
    white-space:nowrap;
  }

  .fh-brand-note{
    display:block;
    margin-top:4px;
    font-size:10px;
    line-height:1;
    letter-spacing:.11em;
    text-transform:uppercase;
    color:var(--fh-header-muted);
    white-space:nowrap;
  }

  .fh-global-nav{
    display:flex;
    align-items:center;
    gap:4px;
    margin-left:auto;
  }

  .fh-global-nav a{
    color:rgba(28,24,20,.70);
    text-decoration:none !important;
    font-size:12px;
    letter-spacing:.08em;
    text-transform:uppercase;
    padding:10px 11px;
    border-radius:999px;
    transition:background .2s ease, color .2s ease;
  }

  .fh-global-nav a:hover,
  .fh-global-nav a.is-active{
    background:rgba(31,58,47,.08);
    color:var(--fh-header-forest);
  }

  .fh-global-nav .fh-global-cta{
    margin-left:5px;
    background:var(--fh-header-forest);
    color:#fffaf2 !important;
    border:1px solid rgba(31,58,47,.26);
    box-shadow:0 8px 18px rgba(31,58,47,.14);
  }

  .fh-global-nav .fh-global-cta:hover{
    background:var(--fh-header-forest2);
    color:#fffaf2 !important;
  }

  .fh-floating-book{
    position:fixed;
    right:18px;
    bottom:18px;
    z-index:99989;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:38px;
    padding:0 15px;
    border-radius:999px;
    background:rgba(31,58,47,.94);
    color:#fffaf2 !important;
    text-decoration:none !important;
    font-size:11px;
    letter-spacing:.12em;
    text-transform:uppercase;
    box-shadow:0 14px 36px rgba(27,23,18,.18);
    border:1px solid rgba(255,250,242,.28);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
  }

  .fh-floating-book:hover{
    background:var(--fh-header-forest2);
  }

  .fh-mobile-toggle{
    display:none;
    width:42px;
    height:42px;
    border-radius:50%;
    border:1px solid rgba(28,24,20,.14);
    background:rgba(255,250,242,.9);
    cursor:pointer;
    align-items:center;
    justify-content:center;
    padding:0;
    flex:0 0 auto;
  }

  .fh-mobile-toggle span,
  .fh-mobile-toggle span::before,
  .fh-mobile-toggle span::after{
    display:block;
    width:17px;
    height:1.5px;
    background:var(--fh-header-ink);
    border-radius:999px;
    content:"";
    transition:transform .22s ease, opacity .22s ease;
  }

  .fh-mobile-toggle span{
    position:relative;
  }

  .fh-mobile-toggle span::before{
    position:absolute;
    top:-6px;
    left:0;
  }

  .fh-mobile-toggle span::after{
    position:absolute;
    top:6px;
    left:0;
  }

  .fh-mobile-toggle[aria-expanded="true"] span{
    background:transparent;
  }

  .fh-mobile-toggle[aria-expanded="true"] span::before{
    transform:translateY(6px) rotate(45deg);
  }

  .fh-mobile-toggle[aria-expanded="true"] span::after{
    transform:translateY(-6px) rotate(-45deg);
  }

  .fh-mobile-menu{
    position:fixed;
    inset:0;
    z-index:99988;
    pointer-events:none;
    opacity:0;
    transition:opacity .22s ease;
  }

  .fh-mobile-menu::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(28,24,20,.18);
    opacity:0;
    transition:opacity .22s ease;
  }

  .fh-mobile-menu.is-open{
    pointer-events:auto;
    opacity:1;
  }

  .fh-mobile-menu.is-open::before{
    opacity:1;
  }

  .fh-mobile-panel{
    position:absolute;
    top:86px;
    right:14px;
    width:min(360px, calc(100vw - 28px));
    max-height:min(620px, calc(100vh - 112px));
    overflow:auto;
    border-radius:26px;
    background:rgba(255,250,242,.96);
    border:1px solid rgba(28,24,20,.13);
    box-shadow:0 24px 80px rgba(27,23,18,.20);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    transform:translateY(-8px) scale(.98);
    transform-origin:top right;
    transition:transform .22s ease;
  }

  .fh-mobile-menu.is-open .fh-mobile-panel{
    transform:translateY(0) scale(1);
  }

  .fh-mobile-panel-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    padding:16px 16px 10px;
    border-bottom:1px solid rgba(28,24,20,.10);
  }

  .fh-mobile-panel-title{
    display:block;
    font-family:Georgia, "Times New Roman", serif;
    font-size:18px;
    line-height:1.1;
    color:var(--fh-header-ink);
  }

  .fh-mobile-panel-sub{
    display:block;
    margin-top:4px;
    font-size:10px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--fh-header-muted);
  }

  .fh-mobile-close{
    width:34px;
    height:34px;
    border-radius:50%;
    border:1px solid rgba(28,24,20,.13);
    background:rgba(255,255,255,.5);
    color:var(--fh-header-ink);
    font-size:18px;
    line-height:1;
    cursor:pointer;
    flex:0 0 auto;
  }

  .fh-mobile-links{
    display:grid;
    gap:6px;
    padding:12px;
  }

  .fh-mobile-links a{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    padding:12px 13px;
    border-radius:18px;
    color:var(--fh-header-ink);
    text-decoration:none !important;
    border:1px solid transparent;
  }

  .fh-mobile-links a:hover,
  .fh-mobile-links a.is-active{
    background:rgba(31,58,47,.07);
    border-color:rgba(31,58,47,.10);
  }

  .fh-mobile-links a strong{
    display:block;
    font-size:13px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--fh-header-ink);
  }

  .fh-mobile-links a small{
    display:block;
    margin-top:4px;
    font-size:11px;
    line-height:1.35;
    color:var(--fh-header-muted);
    max-width:250px;
  }

  .fh-mobile-links a em{
    font-style:normal;
    color:rgba(28,24,20,.45);
    font-size:16px;
  }

  .fh-mobile-reserve{
    margin:0 12px 14px;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:42px;
    border-radius:999px;
    background:var(--fh-header-forest);
    color:#fffaf2 !important;
    text-decoration:none !important;
    font-size:11px;
    letter-spacing:.13em;
    text-transform:uppercase;
  }

  html.fh-nav-open{
    overflow:hidden;
  }

  @media (max-width:1040px){
    .fh-global-nav a{
      padding:9px 8px;
      font-size:11px;
    }

    .fh-brand-note{
      display:none;
    }
  }

  @media (max-width:860px){
    .fh-global-header{
      top:10px;
      width:calc(100vw - 20px);
      min-height:58px;
      padding:8px 9px 8px 11px;
    }

    .fh-global-nav{
      display:none;
    }

    .fh-mobile-toggle{
      display:flex;
    }

    .fh-global-mark{
      width:38px;
      height:38px;
    }

    .fh-brand-name{
      font-size:17px;
    }

    .fh-floating-book{
      right:14px;
      bottom:14px;
      min-height:34px;
      padding:0 13px;
      font-size:10px;
      box-shadow:0 12px 30px rgba(27,23,18,.18);
    }
  }

  @media (max-width:480px){
    .fh-mobile-panel{
      top:76px;
      right:10px;
      width:calc(100vw - 20px);
      max-height:calc(100vh - 96px);
      border-radius:22px;
    }

    .fh-mobile-links a{
      padding:11px 12px;
    }

    .fh-mobile-links a small{
      font-size:10.5px;
    }
  }
</style>

<script>
(function(){

  const FH_WORKER_BASE = "https://fletschhorn-guesty-api.bookings-e2d.workers.dev";
  const FH_INQUIRY_ENDPOINT = FH_WORKER_BASE.replace(/\/$/, "") + "/api/inquiry";

  window.FH_WORKER_BASE = FH_WORKER_BASE;
  window.FH_WORKER_ENDPOINT = FH_WORKER_BASE;
  window.FH_INQUIRY_ENDPOINT = FH_INQUIRY_ENDPOINT;
  window.CLOUDFLARE_INQUIRY_ENDPOINT = FH_INQUIRY_ENDPOINT;

  const HIDE_SQUARESPACE_NATIVE_HEADER_FOOTER = true;

  const FH_PAGES = [
    {
      key: "home",
      label: "Home",
      short: "Home",
      href: "index.html",
      note: "Start with the house, setting, and inquiry.",
      match: ["/", "/index.html", "/home", "/Home"]
    },
    {
      key: "property",
      label: "The Property",
      short: "Property",
      href: "Property.html",
      note: "The property, rooms, spa, amenities, dining and kitchen.",
      match: ["/Property.html", "/property.html", "/property"]
    },
    {
      key: "experiences",
      label: "Experiences",
      short: "Experiences",
      href: "Experiences.html",
      note: "What to do in Saas-Fee and around the property.",
      match: ["/Experiences.html", "/experiences.html", "/experiences"]
    },
    {
      key: "events",
      label: "Wedding & Events",
      short: "Events",
      href: "Wedding-event.html",
      note: "Weddings, private events, retreats, and celebrations.",
      match: ["/Wedding-event.html", "/wedding-event.html", "/wedding-and-events", "/events"]
    },
    {
      key: "location",
      label: "Location",
      short: "Location",
      href: "Location.html",
      note: "Where Fletschhorn is located and what surrounds it.",
      match: ["/Location.html", "/location.html", "/location"]
    },
    {
      key: "booking",
      label: "Booking",
      short: "Booking",
      href: "booking.html",
      note: "Send an inquiry and plan your stay or event.",
      match: ["/booking.html", "/Booking.html", "/booking"]
    },
    {
      key: "about",
      label: "About Us",
      short: "About",
      href: "About-us.html",
      note: "Story, history, and the private-house direction.",
      match: ["/About-us.html", "/about-us.html", "/about"]
    }
  ];

  function normalizePath(path){
    let clean = (path || "/")
      .split("?")[0]
      .split("#")[0]
      .replace(/\/+/g, "/");

    if(clean.length > 1) clean = clean.replace(/\/$/, "");
    return clean || "/";
  }

  function currentPageKey(){
    const bodyPage = document.querySelector("[data-fh-page], [data-page]");
    const explicit = bodyPage && (
      bodyPage.getAttribute("data-fh-page") ||
      bodyPage.getAttribute("data-page")
    );

    if(explicit){
      const key = explicit.toLowerCase();

      if(key.includes("booking")) return "booking";
      if(key.includes("event") || key.includes("wedding")) return "events";
      if(key.includes("experience")) return "experiences";
      if(key.includes("property")) return "property";
      if(key.includes("location")) return "location";
      if(key.includes("about")) return "about";
      if(key.includes("home") || key.includes("index")) return "home";
    }

    const ids = [
      "fh-home",
      "fh-property",
      "fh-experiences",
      "fh-events",
      "fh-location",
      "fh-booking",
      "fh-about"
    ];

    for(const id of ids){
      if(document.getElementById(id)){
        return id.replace("fh-", "");
      }
    }

    const path = normalizePath(window.location.pathname).toLowerCase();

    const found = FH_PAGES.find(page =>
      page.match.some(match => normalizePath(match).toLowerCase() === path)
    );

    return found ? found.key : "home";
  }

  function makeHeader(activeKey){
    const navLinks = FH_PAGES.map(page => `
      <a href="${page.href}" class="${page.key === activeKey ? "is-active" : ""}" data-fh-page-link="${page.key}">
        ${page.short}
      </a>
    `).join("");

    return `
      <header class="fh-global-header" id="fhGlobalHeader">
        <a class="fh-global-brand" href="index.html" aria-label="Fletschhorn home">
          <span class="fh-global-mark">
            <img src="assets/Saas-Fee-Logo.jpeg" alt="Fletschhorn" onerror="this.style.display='none'; this.parentElement.textContent='fh';" />
          </span>
          <span>
            <span class="fh-brand-name">Fletschhorn</span>
            <span class="fh-brand-note">Private alpine house · Saas-Fee</span>
          </span>
        </a>

        <nav class="fh-global-nav" aria-label="Primary navigation">
          ${navLinks}
          <a class="fh-global-cta" href="booking.html">Reserve</a>
        </nav>

        <button class="fh-mobile-toggle" type="button" id="fhMobileToggle" aria-expanded="false" aria-controls="fhMobileMenu" aria-label="Open menu">
          <span></span>
        </button>
      </header>
    `;
  }

  function makeMobileMenu(activeKey){
    const links = FH_PAGES.map(page => `
      <a href="${page.href}" class="${page.key === activeKey ? "is-active" : ""}">
        <span>
          <strong>${page.label}</strong>
          <small>${page.note}</small>
        </span>
        <em>→</em>
      </a>
    `).join("");

    return `
      <div class="fh-mobile-menu" id="fhMobileMenu" aria-hidden="true">
        <div class="fh-mobile-panel" role="dialog" aria-label="Fletschhorn navigation">
          <div class="fh-mobile-panel-head">
            <span>
              <span class="fh-mobile-panel-title">Fletschhorn</span>
              <span class="fh-mobile-panel-sub">Private alpine house</span>
            </span>
            <button class="fh-mobile-close" type="button" id="fhMobileClose" aria-label="Close menu">×</button>
          </div>

          <div class="fh-mobile-links">
            ${links}
          </div>

          <a class="fh-mobile-reserve" href="booking.html">Reserve your stay</a>
        </div>
      </div>
    `;
  }

  function makeFloatingBook(){
    return `
      <a class="fh-floating-book" id="fhFloatingBook" href="booking.html" aria-label="Reserve your stay">
        Reserve
      </a>
    `;
  }

  function syncHeaderLanguageClicks(){
    document.querySelectorAll("[data-fh-lang], [data-lang], [data-language]").forEach(btn => {
      btn.addEventListener("click", () => {
        const lang =
          btn.getAttribute("data-fh-lang") ||
          btn.getAttribute("data-lang") ||
          btn.getAttribute("data-language");

        if(!lang) return;

        try{
          localStorage.setItem("fh_lang", lang);
        }catch(error){}

        document.documentElement.setAttribute("lang", lang);
        document.body.setAttribute("data-fh-lang", lang);

        window.dispatchEvent(new CustomEvent("fh:language-change", {
          detail: { lang }
        }));
      });
    });
  }

  function init(){
    if(document.getElementById("fhGlobalHeader")) return;

    const activeKey = currentPageKey();

    document.body.classList.add("fh-global-shell");
    document.body.classList.add("fh-github-version");

    if(HIDE_SQUARESPACE_NATIVE_HEADER_FOOTER){
      document.body.classList.add("fh-hide-sqs-shell");
    }

    document.body.insertAdjacentHTML("afterbegin", makeMobileMenu(activeKey));
    document.body.insertAdjacentHTML("afterbegin", makeHeader(activeKey));

    if(!document.getElementById("fhFloatingBook")){
      document.body.insertAdjacentHTML("beforeend", makeFloatingBook());
    }

    const header = document.getElementById("fhGlobalHeader");
    const toggle = document.getElementById("fhMobileToggle");
    const menu = document.getElementById("fhMobileMenu");
    const closeBtn = document.getElementById("fhMobileClose");

    function onScroll(){
      if(!header) return;
      header.classList.toggle("is-scrolled", window.scrollY > 20);
    }

    function closeMenu(){
      if(!toggle || !menu) return;

      toggle.setAttribute("aria-expanded", "false");
      menu.setAttribute("aria-hidden", "true");
      menu.classList.remove("is-open");
      document.documentElement.classList.remove("fh-nav-open");
    }

    function openMenu(){
      if(!toggle || !menu) return;

      toggle.setAttribute("aria-expanded", "true");
      menu.setAttribute("aria-hidden", "false");
      menu.classList.add("is-open");
      document.documentElement.classList.add("fh-nav-open");
    }

    if(toggle && menu){
      toggle.addEventListener("click", () => {
        const isOpen = toggle.getAttribute("aria-expanded") === "true";
        isOpen ? closeMenu() : openMenu();
      });

      if(closeBtn){
        closeBtn.addEventListener("click", closeMenu);
      }

      menu.addEventListener("click", event => {
        if(event.target === menu) closeMenu();
      });

      menu.querySelectorAll("a").forEach(a => {
        a.addEventListener("click", closeMenu);
      });

      document.addEventListener("keydown", event => {
        if(event.key === "Escape") closeMenu();
      });
    }

    syncHeaderLanguageClicks();

    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();
  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", init);
  }else{
    init();
  }

})();
</script>
