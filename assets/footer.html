            </a>

          </div>

              ${links}
            </nav>
          </div>

          <div class="fh-footer-col">

          <span>Saas-Fee · Switzerland</span>
        </div>
      </footer>
    `;
  }

  function initFooter(){
    if(document.getElementById('fhGlobalFooter')) return;

    const nativeFooter = document.querySelector('footer:not(#fhGlobalFooter), .Footer, .SiteFooter, [data-test="footer"]');
    if(nativeFooter){
      nativeFooter.style.display = 'none';
    }

    document.body.insertAdjacentHTML('beforeend', makeFooter());
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', initFooter);
  }else{
    initFooter();
  }

})();
