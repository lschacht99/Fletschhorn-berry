    { label: "LinkedIn", href: "https://www.linkedin.com/company/waldhotel-fletschhorn-saas-fee/" }

  function makeFooter(){
    const links = FH_FOOTER_PAGES.map(page => `<a href="${page.href}" data-fh-fi18n="footer.nav.${page.key}">${page.label}</a>`).join("");
    const socialLinks = FH_SOCIAL_LINKS.map(item => `<a href="${item.href}" target="_blank" rel="noopener noreferrer">${item.label}</a>`).join("");

    return `
      <footer class="fh-global-footer" id="fhGlobalFooter">
        <div class="fh-footer-shell">
          <div class="fh-footer-topline"></div>
          <div class="fh-footer-main">
            <div class="fh-footer-brand">
              <a href="index.html" class="fh-footer-logo" aria-label="Fletschhorn home">
                <span class="fh-footer-mark">
                  <img src="assets/Saas-Fee-Logo.jpeg" alt="Fletschhorn" onerror="this.style.display='none'; this.parentElement.textContent='fh';" />
                </span>
                <span class="fh-footer-wordmark">

                  <small data-fh-fi18n="footer.tagline">Private alpine hotel · Saas-Fee</small>
                </span>
              </a>

              <nav class="fh-footer-links" aria-label="Footer navigation">${links}</nav>
            </div>

            <div class="fh-footer-info-block">
              <h3 data-fh-fi18n="footer.privateStay">Private stay</h3>
              <p data-fh-fi18n="footer.privateStayText">One group only. No outside guests. Full-property privacy, kitchen flexibility, mountain views, sauna by arrangement, and direct planning for arrivals, dining, and group rhythm.</p>
              <div class="fh-footer-social-block">
                <h3 data-fh-fi18n="footer.follow">Follow</h3>
                <nav class="fh-footer-social-links" aria-label="Social links">${socialLinks}</nav>

            </div>

            </div>
          </div>
          <div class="fh-footer-bottom">
            <span>© ${new Date().getFullYear()} Fletschhorn</span>
            <span>Saas-Fee · Switzerland</span>
          </div>
        </div>
      </footer>
    `;
  }

  function initFooter(){
    if(document.getElementById("fhGlobalFooter")) return;
    const nativeFooter = document.querySelector("footer:not(#fhGlobalFooter), .Footer, .SiteFooter, [data-test='footer']");
    if(nativeFooter) nativeFooter.style.display = "none";
    document.body.insertAdjacentHTML("beforeend", makeFooter());
  }

  if(document.readyState === "loading") document.addEventListener("DOMContentLoaded", initFooter);
  else initFooter();
})();
</script>

  function patchEvents(){
    const root = one("#fh-events");
    if(!root) return;
    document.title = "Fletschhorn · Weddings, Corporate Retreats & Private Events";

  function normalizeFooterLang(raw){
    raw = String(raw || "en").toLowerCase();
    if(raw.indexOf("iw") === 0) raw = "he";
    raw = raw.slice(0, 2);
    return FOOTER_I18N[raw] ? raw : "en";
  }

  function storedFooterLang(){
    try {
      return normalizeFooterLang(
        localStorage.getItem("fh_lang") || localStorage.getItem("fh_language") || localStorage.getItem("fhLang") || document.documentElement.getAttribute("lang") || "en"
      );
    } catch(error) {
      return "en";
    }
  }

  function applyFooterI18n(rawLang){
    const lang = normalizeFooterLang(rawLang);
    const dict = FOOTER_I18N[lang];
    document.querySelectorAll("[data-fh-fi18n]").forEach(function(el){
      const key = el.getAttribute("data-fh-fi18n");
      const value = dict[key] || FOOTER_I18N.en[key];
      if(value == null){
        console.warn("[i18n] missing footer key:", key, "lang:", lang);
        return;
      }
      el.textContent = value;
    });
  }

  function runPatch(){
    patchHome();
    patchEvents();
    patchExperiences();
    patchLocation();

    /*
      This patch injects/overwrites [data-i18n] elements with hardcoded
      English text. It runs after the header/footer fetch(), which is
      always later than the page's own i18n script, so it was silently
      reverting already-translated content back to English on every
      page load. Re-apply the active language immediately afterward so
      translated content wins.
    */
    const activeLang = storedFooterLang();
    const relang = window.setFletschhornLanguage || window.FHSetLanguage;
    if (typeof relang === "function") {
      relang(activeLang);
    } else {
      console.warn("[i18n] no page-level language function found to re-apply after footer patch; page content may stay in English.");
    }

    /* Translate everything this file injected (footer chrome + estate sections). */
    applyFooterI18n(activeLang);
  }

  /* Toolbar clicks and cross-tab changes re-translate the injected content. */
  window.addEventListener("fh-language-change", function(event){
    applyFooterI18n(event.detail && (event.detail.lang || event.detail.language));
  });
  window.addEventListener("storage", function(event){
    if(["fh_lang","fh_language","fhLang"].indexOf(event.key) >= 0) applyFooterI18n(event.newValue);
  });

  if(document.readyState === "loading") document.addEventListener("DOMContentLoaded", runPatch);
  else runPatch();
  window.setTimeout(runPatch, 250);
  window.setTimeout(runPatch, 900);
  window.addEventListener("fh-language-change", function(){ window.setTimeout(runPatch, 80); });
})();
