          </div>
        </section>
      `);
    }
  }

  function patchExperiences(){
    const root = one("#fh-experiences");
    if(!root) return;
    document.title = "Fletschhorn · Private Ski Weeks & Alpine Experiences";
    meta("description", "Private ski weeks, summer trails, wellness, sauna, dining and alpine experiences from a fully private hotel above Saas-Fee.");

    if(!one("#winter")){
      const winterTarget = Array.from(root.querySelectorAll("section, article, div")).find(function(el){ return /winter|ski|glacier/i.test(el.textContent || ""); }) || root.firstElementChild;
      if(winterTarget) winterTarget.insertAdjacentHTML("beforebegin", '<span class="fh-estate-anchor" id="winter"></span>');
    }

    if(!one("#fh-winter-private-ski-weeks")){
      const anchor = one("#winter") || root.firstElementChild;
      after(anchor, `
        <section class="fh-estate-dossier" id="fh-winter-private-ski-weeks">
          <div class="fh-estate-dossier-card">
            <h2>Private Ski Weeks</h2>
            <p>Fletschhorn works as a private winter base for ski groups, families, and alpine weeks together: mountain days outside, then the whole hotel waiting for your group only.</p>
            <ul>
              <li>Glacier skiing and high-alpine winter days</li>
              <li>Warm returns, sauna after skiing, and fireside evenings</li>
              <li>Group dinners with Private Chef · Catering · Self-Cooking options by arrangement</li>
              <li>No splitting guests across multiple hotels</li>
              <li>Shuttle, luggage, and car-free Saas-Fee arrival planning</li>
            </ul>
          </div>
        </section>
      `);
    }
  }

  function patchLocation(){
    const root = one("#fh-location") || one("#access");
    if(!root) return;
    if(!one("#fh-how-to-get-here-composition")){
      append(root, `
        <section class="fh-estate-dossier" id="fh-how-to-get-here-composition">
          <div class="fh-estate-dossier-card">
            <h2>How to get here</h2>
            <p>Saas-Fee is car-free, so arrival is best planned before the stay. The group can coordinate car arrival, train and bus arrival, luggage movement, shuttle timing, and private transfer details.</p>
            <ul>
              <li>Arrive by car to Saas-Fee, then continue according to village access rules</li>
              <li>Arrive by train and bus with luggage planning</li>
              <li>Coordinate shuttle windows where available</li>
              <li>Helicopter transfer by request; pricing to be confirmed</li>
            </ul>
          </div>
        </section>
      `);
    }
  }

  function runPatch(){
    patchHome();
    patchEvents();
    patchExperiences();
    patchLocation();

    /*
      This patch injects/overwrites [data-i18n] elements with hardcoded
      English text. It runs after the header/footer fetch(), which is
      always later than the page's own i18n script, so it was silently
      reverting already-translated content back to English on every
      page load. Re-apply the active language immediately afterward so
      translated content wins.
    */
    let activeLang = "en";
    try {
      activeLang = localStorage.getItem("fh_lang") || localStorage.getItem("fh_language") || localStorage.getItem("fhLang") || document.documentElement.getAttribute("lang") || "en";
    } catch(error) {}

    const relang = window.setFletschhornLanguage || window.FHSetLanguage;
    if (typeof relang === "function") {
      relang(activeLang);
    } else {
      console.warn("[i18n] no page-level language function found to re-apply after footer patch; injected content may stay in English.");
    }
  }

  if(document.readyState === "loading") document.addEventListener("DOMContentLoaded", runPatch);
  else runPatch();
  window.setTimeout(runPatch, 250);
  window.setTimeout(runPatch, 900);
  window.addEventListener("fh-language-change", function(){ window.setTimeout(runPatch, 80); });
})();
</script>
