<!-- ==========================================================
Fletschhorn — Global Footer Only
Paste in: Squarespace > Settings > Advanced > Code Injection > Footer

Design direction:
- Matches current Fletschhorn mineral / alpine / editorial DNA
- Clean ivory / stone / graphite palette
- No green gradient, no bulky hotel-footer feeling
- Mobile footer stays short
- Booking path fixed to booking.html
========================================================== -->

<script>
(function(){

  const FH_WORKER_BASE = "https://guetsyapi.moshe-cohen-h1.workers.dev";
  const FH_INQUIRY_ENDPOINT = FH_WORKER_BASE.replace(/\/$/, "") + "/guesty/book-inquiry";

  window.FH_WORKER_BASE = FH_WORKER_BASE;
  window.FH_WORKER_ENDPOINT = FH_WORKER_BASE;
  window.FH_INQUIRY_ENDPOINT = FH_INQUIRY_ENDPOINT;
  window.CLOUDFLARE_INQUIRY_ENDPOINT = FH_INQUIRY_ENDPOINT;

  const FH_FOOTER_PAGES = [
    { label: "Home", href: "index.html" },
    { label: "Property", href: "Property.html" },
    { label: "Experiences", href: "Experiences.html" },
    { label: "Events", href: "Wedding-event.html" },
    { label: "Location", href: "Location.html" },
    { label: "Booking", href: "booking.html" },
    { label: "About", href: "About-us.html" }
  ];

  function makeFooter(){
    const links = FH_FOOTER_PAGES.map(page => `
      <a href="${page.href}">${page.label}</a>
    `).join("");

    return `
      <footer class="fh-global-footer" id="fhGlobalFooter">
        <div class="fh-footer-shell">

          <div class="fh-footer-topline"></div>

          <div class="fh-footer-main">

            <div class="fh-footer-brand">
              <a href="index.html" class="fh-footer-logo" aria-label="Fletschhorn home">
                <span class="fh-footer-mark">
                  <img src="assets/Saas-Fee-Logo.jpeg" alt="Fletschhorn" onerror="this.style.display='none'; this.parentElement.textContent='fh';" />
                </span>
                <span class="fh-footer-wordmark">
                  <strong>Fletschhorn</strong>
                  <small>Private alpine house · Saas-Fee</small>
                </span>
              </a>

              <p>
                A private alpine house for whole-property stays, family gatherings,
                retreats, weddings and quiet mountain weeks above Saas-Fee.
              </p>
            </div>

            <div class="fh-footer-nav-block">
              <h3>Navigate</h3>
              <nav class="fh-footer-links" aria-label="Footer navigation">
                ${links}
              </nav>
            </div>

            <div class="fh-footer-info-block">
              <h3>Private stay</h3>
              <p>
                Exclusive access to the property, 14 rooms reserved for your group,
                daily shuttles, refreshments, kitchen access and optional catering on request.
              </p>
            </div>

            <div class="fh-footer-contact-block">
              <h3>Contact</h3>
              <p>
                Waldhotel Fletschhorn<br>
                Wildistrasse<br>
                3906 Saas-Fee, Switzerland
              </p>
              <p class="fh-footer-contact-line">
                <a href="tel:+41279572131">+41 27 957 2131</a><br>
                <a href="mailto:welcome@fletschhorn.ch">welcome@fletschhorn.ch</a>
              </p>
              <a class="fh-footer-cta" href="booking.html">Book my stay now</a>
            </div>

          </div>

          <div class="fh-footer-bottom">
            <span>© ${new Date().getFullYear()} Fletschhorn</span>
            <span>Saas-Fee · Switzerland</span>
          </div>

        </div>
      </footer>
    `;
  }

  function initFooter(){
    if(document.getElementById("fhGlobalFooter")) return;

    const nativeFooter = document.querySelector("footer:not(#fhGlobalFooter), .Footer, .SiteFooter, [data-test='footer']");
    if(nativeFooter){
      nativeFooter.style.display = "none";
    }

    document.body.insertAdjacentHTML("beforeend", makeFooter());
  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", initFooter);
  }else{
    initFooter();
  }

})();
</script>

<style>

}

.fh-footer-shell{

</style>
