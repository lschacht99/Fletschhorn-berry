<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Book your stay</title>
  <meta name="description" content="" />
  <link rel="stylesheet" href="assets/fh-global.css">

  <!--
    CLEAN WORKER PROPERTY SHELL
    - No hardcoded property description.
    - Listing text, title, rooms, amenities, rules, address load from /listing and /content?lang=...
    - Photos load from /images.
    - Calendar/prices load from /calendar?from=YYYY-MM-DD&to=YYYY-MM-DD.
    - Quote sends numberOfGuests.numberOfAdults to /quote.
    - Hidden language toolbar: language can still be driven by header/localStorage/query string.
  -->

  <style>
    :root{
      --tm-ink:#222222;
      --tm-soft-ink:#4f4b47;
      --tm-muted:#77716a;
      --tm-line:rgba(34,34,34,.12);
      --tm-light-line:rgba(34,34,34,.08);
      --tm-paper:#ffffff;
      --tm-warm:#f7f2ea;
      --tm-warm-2:#efe8dd;
      --tm-dark:#383838;
      --tm-footer:#303535;
      --tm-accent:#f6432f;
      --tm-accent-dark:#d73422;
      --tm-available:#e4f4d9;
      --tm-selected:#b7db9f;
      --tm-unavailable:#eeeeee;
      --tm-booked:#fdd2d2;
      --tm-shadow:0 18px 42px rgba(33,33,33,.10);
      --tm-serif:Georgia,"Times New Roman",serif;
      --tm-sans:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;background:#fff;color:var(--tm-ink);font-family:var(--tm-sans);overflow-x:hidden}
    a{color:inherit;text-decoration:none}
    img{display:block;max-width:100%}
    button,input,select,textarea{font:inherit}
    [hidden],.is-hidden{display:none!important}
    .tm-language-toolbar{display:none!important;visibility:hidden!important;height:0!important;overflow:hidden!important}

    .tm-page{background:#fff;min-height:100vh}
    .tm-container{width:min(1180px,calc(100% - 32px));margin:0 auto}

    /* Tiny hero: clean, short, site-color compatible */
    .tm-hero{
      min-height:154px;
      display:flex;
      align-items:center;
      background:
        linear-gradient(90deg,rgba(255,255,255,.82),rgba(255,255,255,.50)),
        linear-gradient(135deg,var(--tm-warm) 0%,#fff 52%,var(--tm-warm-2) 100%);
      border-bottom:1px solid var(--tm-light-line);
    }
    .tm-hero-inner{display:flex;align-items:end;justify-content:space-between;gap:24px;padding:34px 0 28px}
    .tm-kicker{margin:0 0 8px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--tm-muted);font-weight:750}
    .tm-hero h1{margin:0;font-family:var(--tm-serif);font-size:clamp(38px,5vw,64px);font-weight:400;letter-spacing:-.045em;line-height:.95;color:var(--tm-ink)}
    .tm-hero-action{display:inline-flex;align-items:center;justify-content:center;background:var(--tm-accent);border:1px solid var(--tm-accent);color:#fff;border-radius:2px;padding:12px 18px;font-weight:750;white-space:nowrap;transition:.18s ease}
    .tm-hero-action:hover{background:#fff;color:var(--tm-accent)}

    /* Clean photo frame. Same worker loading logic, less visual mess. */
    .tm-photo-section{padding:18px 0 0;background:#fff}
    .tm-photo-grid{position:relative;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;min-height:220px}
    .tm-photo-card{position:relative;min-height:220px;background:#eee;overflow:hidden;border:1px solid rgba(0,0,0,.04)}
    .tm-photo-card:first-child{grid-column:span 2;grid-row:span 2;min-height:448px}
    .tm-photo-card img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .22s ease,transform .35s ease}
    .tm-photo-card img[src]{opacity:1}
    .tm-photo-card:hover img{transform:scale(1.018)}
    .tm-photo-overlay{position:absolute;right:14px;bottom:14px;display:flex;gap:8px;z-index:3}
    .tm-small-btn{border:0;border-radius:2px;background:#fff;color:#111;padding:10px 13px;font-size:13px;font-weight:750;box-shadow:0 8px 22px rgba(0,0,0,.18);cursor:pointer}

    .tm-title-band{padding:30px 0 22px;border-bottom:1px solid var(--tm-light-line)}
    .tm-title-layout{display:grid;grid-template-columns:minmax(0,1fr) 348px;gap:42px;align-items:start}
    .tm-property-name{margin:0 0 10px;font-size:clamp(30px,4vw,46px);line-height:1.08;font-weight:520;letter-spacing:-.03em;color:var(--tm-ink)}
    .tm-address{margin:0 0 18px;color:var(--tm-muted);font-size:15px;line-height:1.55}
    .tm-summary{max-width:780px;margin:0;color:var(--tm-soft-ink);font-size:16px;line-height:1.72}
    .tm-meta-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:22px;max-width:640px}
    .tm-meta{border:1px solid var(--tm-light-line);background:#fff;min-height:82px;padding:14px 12px;text-align:center}
    .tm-meta strong{display:block;font-size:29px;line-height:1.1;font-weight:680;color:#111}
    .tm-meta span{display:block;margin-top:6px;color:var(--tm-muted);font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:700}

    .tm-booking-card{position:sticky;top:88px;border:1px solid var(--tm-line);background:#fff;box-shadow:var(--tm-shadow);padding:18px;z-index:10}
    .tm-booking-card h2{margin:0 0 4px;font-size:21px;line-height:1.2;font-weight:680}
    .tm-price-line{min-height:24px;margin:0 0 14px;color:var(--tm-muted);font-size:14px}
    .tm-price-line strong{color:#111;font-size:18px}
    .tm-booking-fields{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    .tm-field{display:grid;gap:5px}
    .tm-field.full{grid-column:1/-1}
    .tm-field label{font-size:10px;letter-spacing:.09em;text-transform:uppercase;font-weight:800;color:#6f6a64}
    .tm-field input,.tm-field select,.tm-field textarea{width:100%;border:1px solid var(--tm-line);background:#fff;color:#111;border-radius:2px;outline:none}
    .tm-field input,.tm-field select{height:43px;padding:0 9px}
    .tm-field textarea{min-height:112px;padding:10px;resize:vertical}
    .tm-field input:focus,.tm-field select:focus,.tm-field textarea:focus{border-color:#222;box-shadow:0 0 0 2px rgba(34,34,34,.05)}
    .tm-quote-box{display:none;margin-top:12px;border:1px solid var(--tm-light-line);background:#fafafa;padding:10px}
    .tm-quote-box.has-content{display:block}
    .tm-quote-row{display:flex;justify-content:space-between;gap:14px;padding:6px 0;border-bottom:1px solid var(--tm-light-line);font-size:14px;color:#4c4945}
    .tm-quote-row:last-child{border-bottom:0;font-weight:800;color:#111}
    .tm-book-btn{width:100%;height:48px;border:1px solid var(--tm-accent);background:var(--tm-accent);color:#fff;border-radius:2px;margin-top:12px;font-weight:800;cursor:pointer;transition:.18s ease}
    .tm-book-btn:hover{background:#fff;color:var(--tm-accent)}
    .tm-book-btn:disabled{background:#999;border-color:#999;color:#fff;opacity:.5;cursor:not-allowed}
    .tm-status{min-height:18px;margin-top:9px;font-size:12px;color:var(--tm-muted)}
    .tm-status.is-error{color:#9b1d1d}

    .tm-main-layout{display:grid;grid-template-columns:minmax(0,1fr) 348px;gap:42px;align-items:start;padding:0 0 42px}
    .tm-content{min-width:0}
    .tm-side{display:block}
    .tm-section{display:none;padding:38px 0;border-bottom:1px solid var(--tm-light-line)}
    .tm-section.has-content{display:block}
    .tm-section-head{display:flex;align-items:center;gap:16px;margin-bottom:18px}
    .tm-section-head h2{margin:0;font-size:26px;line-height:1.2;font-weight:640;letter-spacing:-.01em}
    .tm-section-head::after{content:"";height:1px;background:var(--tm-light-line);flex:1}
    .tm-text{color:var(--tm-soft-ink);font-size:16px;line-height:1.76}
    .tm-text p{margin:0 0 14px}
    .tm-text p:last-child{margin-bottom:0}

    .tm-description-blocks{display:grid;gap:22px}
    .tm-description-block{display:none}
    .tm-description-block.has-content{display:block}
    .tm-description-block h3{margin:0 0 7px;font-size:19px;font-weight:680;color:#222}

    .tm-room-grid,.tm-amenity-grid,.tm-policy-grid{display:grid;gap:12px}
    .tm-room-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
    .tm-amenity-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
    .tm-policy-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    .tm-card{border:1px solid var(--tm-light-line);background:#fff;padding:16px;min-height:120px}
    .tm-card h3{margin:0 0 8px;font-size:15px;letter-spacing:.06em;text-transform:uppercase;font-weight:800;color:#222}
    .tm-card div{font-size:14px;line-height:1.58;color:var(--tm-soft-ink)}
    .tm-amenity{display:flex;align-items:center;gap:10px;min-height:44px;border:1px solid var(--tm-light-line);padding:11px 12px;background:#fff;font-size:14px;color:#333}
    .tm-amenity::before{content:"";width:6px;height:6px;background:#222;border-radius:999px;opacity:.66;flex:0 0 auto}

    .tm-calendar-tools{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:9px;margin-bottom:14px;align-items:end}
    .tm-calendar-wrap{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .tm-month{border:1px solid var(--tm-light-line);background:#fff;padding:12px}
    .tm-month-title{text-align:center;font-weight:800;margin-bottom:10px;min-height:22px}
    .tm-weekdays,.tm-days{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px}
    .tm-weekdays span{text-align:center;color:var(--tm-muted);font-size:10px;text-transform:uppercase;letter-spacing:.04em;padding-bottom:4px}
    .tm-day{min-height:62px;border:1px solid #eee;background:var(--tm-available);padding:5px;font-size:12px;cursor:pointer;position:relative;overflow:hidden}
    .tm-day.is-empty{background:transparent;border-color:transparent;cursor:default}
    .tm-day.is-disabled{background:var(--tm-unavailable);color:#999;cursor:not-allowed}
    .tm-day.is-booked,.tm-day.is-blocked{background:var(--tm-booked);color:#7d2222;cursor:not-allowed}
    .tm-day.is-selected{background:var(--tm-selected);outline:2px solid #222;outline-offset:-2px}
    .tm-day-number{font-weight:800}
    .tm-day-price{display:block;margin-top:5px;color:#62605c;font-size:11px;line-height:1.2;word-break:break-word}
    .tm-calendar-note{min-height:20px;margin-top:10px;color:var(--tm-muted);font-size:13px}

    .tm-map{height:340px;border:1px solid var(--tm-light-line);background:#f2f2f2;overflow:hidden}
    .tm-map iframe{width:100%;height:100%;border:0;display:block;filter:saturate(.85)}
    .tm-location-lines{margin-top:12px;color:var(--tm-soft-ink);font-size:15px;line-height:1.65}

    .tm-inquiry{background:var(--tm-warm);border-top:1px solid var(--tm-light-line);padding:38px 0}
    .tm-inquiry-grid{display:grid;grid-template-columns:minmax(0,.85fr) minmax(0,1.15fr);gap:32px;align-items:start}
    .tm-inquiry h2{margin:0 0 10px;font-size:28px;font-weight:640;letter-spacing:-.02em}
    .tm-inquiry p{margin:0;color:var(--tm-soft-ink);line-height:1.68}
    .tm-inquiry-form{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    .tm-inquiry-form .full{grid-column:1/-1}

    .tm-footer{background:var(--tm-footer);color:#e9e2d8;padding:30px 0}
    .tm-footer-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px}
    .tm-footer h3{margin:0 0 8px;color:#fff;font-size:18px}
    .tm-footer div,.tm-footer a{font-size:14px;line-height:1.7;color:#d8d0c5}

    .tm-modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.92);display:none;overflow:auto;padding:16px}
    .tm-modal.is-open{display:block}
    .tm-modal-bar{position:sticky;top:0;z-index:2;text-align:right;padding-bottom:12px}
    .tm-modal-close{border:0;background:#fff;color:#111;padding:10px 14px;font-weight:800;cursor:pointer}
    .tm-modal-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;width:min(1280px,100%);margin:0 auto}
    .tm-modal-grid img{width:100%;height:270px;object-fit:cover;background:#222}

    @media(max-width:1050px){
      .tm-title-layout,.tm-main-layout{grid-template-columns:1fr}
      .tm-side{display:none}
      .tm-booking-card{position:relative;top:auto;margin-top:22px}
      .tm-room-grid,.tm-amenity-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .tm-footer-grid{grid-template-columns:1fr}
    }

    @media(max-width:760px){
      .tm-container{width:calc(100% - 22px)}
      .tm-hero{min-height:124px}
      .tm-hero-inner{padding:26px 0 22px;align-items:start;flex-direction:column;gap:14px}
      .tm-hero h1{font-size:42px}
      .tm-photo-section{padding-top:10px}
      .tm-photo-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:7px;min-height:0}
      .tm-photo-card,.tm-photo-card:first-child{grid-column:auto;grid-row:auto;min-height:156px;height:156px}
      .tm-photo-card:nth-child(n+5){display:none}
      .tm-photo-overlay{right:9px;bottom:9px}
      .tm-small-btn{padding:8px 10px;font-size:12px}
      .tm-title-band{padding-top:24px}
      .tm-meta-row{grid-template-columns:repeat(3,minmax(0,1fr));gap:7px}
      .tm-meta{min-height:76px;padding:12px 7px}
      .tm-meta strong{font-size:25px}
      .tm-meta span{font-size:9px}
      .tm-booking-fields{grid-template-columns:1fr 1fr}
      .tm-room-grid,.tm-amenity-grid,.tm-policy-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .tm-calendar-tools{grid-template-columns:1fr 1fr}
      .tm-calendar-wrap{grid-template-columns:1fr}
      .tm-day{min-height:58px;font-size:12px}
      .tm-inquiry-grid{grid-template-columns:1fr}
      .tm-inquiry-form{grid-template-columns:1fr 1fr}
      .tm-modal-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .tm-modal-grid img{height:190px}
    }


    /* ===== FLETSCHHORN DESIGN MATCH + SHARED HEADER/FOOTER SAFE LAYOUT ===== */
    :root{
      --tm-ink:#191714;
      --tm-soft-ink:#3f3932;
      --tm-muted:rgba(25,23,20,.67);
      --tm-line:rgba(25,23,20,.13);
      --tm-light-line:rgba(25,23,20,.08);
      --tm-paper:#fffaf3;
      --tm-warm:#f7f1e8;
      --tm-warm-2:#efe5d9;
      --tm-dark:#22392f;
      --tm-footer:#22392f;
      --tm-accent:#22392f;
      --tm-accent-dark:#314f43;
      --tm-available:#e4f4d9;
      --tm-selected:#b7db9f;
      --tm-unavailable:#eee7dc;
      --tm-booked:#f3d4cc;
      --tm-shadow:0 18px 48px rgba(22,19,16,.11);
    }
    body{background:#efe5d9;color:var(--tm-ink)}
    body.fh-github-version{background:#efe5d9}
    .tm-page{
      background:linear-gradient(180deg,#efe5d9 0%,#fffaf3 28%,#f3eadf 64%,#fbf6ef 100%);
      color:var(--tm-ink);
      padding-top:0;
    }
    #fh-header-slot:empty,#fh-footer-slot:empty{display:none}
    .tm-container{width:min(1180px,calc(100% - 28px));}
    .tm-hero{
      min-height:132px;
      background:
        radial-gradient(circle at 14% 0%,rgba(255,255,255,.72),transparent 0 30%),
        linear-gradient(135deg,#efe5d9 0%,#fffaf3 54%,#f7f1e8 100%);
      border-bottom:1px solid rgba(25,23,20,.10);
      color:var(--tm-ink);
    }
    .tm-hero-inner{padding:30px 0 24px;align-items:center;}
    .tm-kicker{color:#876e58;letter-spacing:.18em;font-size:10px;font-weight:850;}
    .tm-hero h1{font-size:clamp(34px,4.7vw,58px);letter-spacing:-.055em;color:var(--tm-ink)}
    .tm-hero-action,.tm-book-btn{
      background:#22392f;border-color:#22392f;color:#fffaf3;border-radius:0;letter-spacing:.13em;text-transform:uppercase;font-size:11px;font-weight:850;
    }
    .tm-hero-action:hover,.tm-book-btn:hover{background:#314f43;border-color:#314f43;color:#fffaf3;}
    .tm-photo-section{background:#fffaf3;padding:16px 0 0;}
    .tm-photo-grid{
      gap:10px;
      min-height:260px;
      padding:0;
      background:transparent;
    }
    .tm-photo-card{
      background:#d8cfc2;
      border:1px solid rgba(25,23,20,.08);
      min-height:190px;
      box-shadow:none;
    }
    .tm-photo-card:first-child{min-height:390px;}
    .tm-photo-card img{filter:saturate(.95) contrast(1.02);}
    .tm-small-btn{border-radius:0;color:#191714;background:#fffaf3;border:1px solid rgba(25,23,20,.10);box-shadow:0 12px 34px rgba(22,19,16,.16)}
    .tm-title-band,.tm-inquiry{background:transparent;border-color:rgba(25,23,20,.10);}
    .tm-title-layout{gap:24px;align-items:start;}
    .tm-property-name,.tm-section-head h2,.tm-inquiry h2,.tm-booking-card h2{
      font-family:Georgia,"Times New Roman",serif;color:#191714;font-weight:400;letter-spacing:-.05em;
    }
    .tm-summary{color:rgba(25,23,20,.67);}
    .tm-meta-row{border-color:rgba(25,23,20,.11);background:rgba(255,250,243,.72);box-shadow:0 14px 42px rgba(22,19,16,.06)}
    .tm-meta:first-child{background:#22392f;color:#fffaf3;}
    .tm-meta:first-child span{color:rgba(255,250,243,.72)}
    .tm-booking-card,.tm-description-block,.tm-card,.tm-calendar-wrap,.tm-inquiry-form{
      background:rgba(255,250,243,.92);
      border:1px solid rgba(25,23,20,.10);
      box-shadow:0 14px 42px rgba(22,19,16,.08);
      border-radius:0;
    }
    .tm-booking-card{top:104px;}
    .tm-field input,.tm-field select,.tm-field textarea{
      background:#fffaf3;border-color:rgba(25,23,20,.13);border-radius:0;color:#191714;
    }
    .tm-field input:focus,.tm-field select:focus,.tm-field textarea:focus{outline:1px solid #22392f;border-color:#22392f;}
    .tm-section-head::after{background:rgba(25,23,20,.10)}
    .tm-description-block h3,.tm-card h3{font-family:Georgia,"Times New Roman",serif;font-weight:400;letter-spacing:-.035em;color:#191714;}
    .tm-amenity{background:rgba(255,250,243,.75);border-color:rgba(25,23,20,.10);}
    .tm-amenity::before{background:#b99f86;opacity:1;}
    .tm-day{background:#fffaf3;border-color:rgba(25,23,20,.10);}
    .tm-day.is-selected{background:#22392f;color:#fffaf3;border-color:#22392f;}
    .tm-day.is-range{background:rgba(34,57,47,.11);}
    .tm-day.is-blocked{background:#eee7dc;color:rgba(25,23,20,.48);}
    .tm-map{background:#d8cfc2;border:1px solid rgba(25,23,20,.10);}
    .tm-modal{background:rgba(25,23,20,.72)}
    .tm-modal-bar{background:#22392f;color:#fffaf3;}
    .tm-modal-close{border-radius:0;background:#fffaf3;color:#191714;}
    #fh-footer-slot{background:#22392f;color:#fffaf3;}
    @media(max-width:720px){
      .tm-page{padding-top:0;}
      .tm-hero{min-height:118px;}
      .tm-hero-inner{padding:24px 0 20px;gap:14px;}
      .tm-photo-grid{display:flex;gap:10px;overflow-x:auto;scroll-snap-type:x mandatory;padding:0 14px 4px 0;scrollbar-width:none;}
      .tm-photo-grid::-webkit-scrollbar{display:none}
      .tm-photo-card,.tm-photo-card:first-child{flex:0 0 82%;min-height:295px;scroll-snap-align:start;grid-column:auto;grid-row:auto;}
      .tm-photo-card:nth-child(even){flex-basis:74%;}
      .tm-photo-overlay{position:sticky;right:0;align-self:flex-end;min-width:max-content;margin-left:-90px;bottom:12px;}
      .tm-title-band{padding-top:22px;}
    }

  </style>
</head>

<body>
  <div id="fh-header-slot"></div>
  <div class="tm-language-toolbar" aria-hidden="true"></div>

  <div class="tm-page">
    <section class="tm-hero" aria-label="Booking hero">
      <div class="tm-container tm-hero-inner">
        <div>
          <p class="tm-kicker" id="heroKicker"></p>
          <h1>Book your stay</h1>
        </div>
        <a class="tm-hero-action" href="#bookingCard">Check availability</a>
      </div>
    </section>

    <section class="tm-photo-section" aria-label="Property photos">
      <div class="tm-container">
        <div class="tm-photo-grid" id="photoGrid"></div>
      </div>
    </section>

    <section class="tm-title-band">
      <div class="tm-container tm-title-layout">
        <div>
          <h2 class="tm-property-name" id="propertyTitle"></h2>
          <p class="tm-address" id="propertyAddress"></p>
          <p class="tm-summary" id="propertySummary"></p>
          <div class="tm-meta-row" id="metaRow" hidden>
            <div class="tm-meta"><strong id="guestCount"></strong><span>Guests</span></div>
            <div class="tm-meta"><strong id="bedroomCount"></strong><span>Bedrooms</span></div>
            <div class="tm-meta"><strong id="bathroomCount"></strong><span>Bathrooms</span></div>
          </div>
        </div>

        <aside class="tm-booking-card" id="bookingCard" aria-label="Booking form">
          <h2>Book your stay</h2>

    <div class="tm-modal-grid" id="modalGrid"></div>
  </div>



  <script>
  (function(){
    "use strict";
    document.body.classList.add("fh-github-version");
    const ASSET_BASE = new URL("assets/", document.baseURI).href;
    async function loadHtml(slotId, fileName){
      const slot = document.getElementById(slotId);
      if (!slot) return;
      try {
        const response = await fetch(ASSET_BASE + fileName, { cache:"no-cache" });
        if (!response.ok) throw new Error(fileName + " failed: " + response.status);
        const html = await response.text();
        slot.innerHTML = html;
        slot.querySelectorAll("script").forEach(function(oldScript){
          const newScript = document.createElement("script");
          Array.from(oldScript.attributes).forEach(function(attr){ newScript.setAttribute(attr.name, attr.value); });
          newScript.textContent = oldScript.textContent;
          oldScript.replaceWith(newScript);
        });
      } catch(error) {
        console.error("Fletschhorn shared header/footer load error:", error);
      }
    }
    loadHtml("fh-header-slot", "Header.html");
    loadHtml("fh-footer-slot", "footer.html");
  })();
  </script>

  <script>
    const CONFIG = {
      WORKER_BASE: "https://fletschhorn-guesty-api.bookings-e2d.workers.dev",
      CHECKOUT_URL: "checkout.html",
      PROPERTY_ID: "",
      DEFAULT_LANG: "en",
      MAX_VISIBLE_PHOTOS: 9,
      MAX_AMENITIES: 30
    };

    const state = {
      listing:null,
      content:null,
      images:[],
      calendar:new Map(),
      selectedStart:null,
      selectedEnd:null,
      lastQuote:null,
      lang:getLang()
    };

    const $ = (id) => document.getElementById(id);
    const clean = (value) => String(value ?? "").replace(/<[^>]*>/g," ").replace(/\s+/g," ").trim();
    const htmlText = (value) => {
      const text = clean(value);
      if(!text) return "";
      return text.split(/\n{2,}|(?<=\.)\s+(?=[A-ZÀ-Ü])/).filter(Boolean).slice(0,8).map(p => `<p>${escapeHtml(p)}</p>`).join("");
    };
    const escapeHtml = (s) => String(s ?? "").replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]));

    function getLang(){
      const url = new URL(window.location.href);
      return url.searchParams.get("lang") || localStorage.getItem("fh_lang") || document.documentElement.lang || CONFIG.DEFAULT_LANG;
    }

    function endpoint(path){
      const base = CONFIG.WORKER_BASE.replace(/\/+$/," ").trim();
      return base + "/" + String(path).replace(/^\/+/,"");
    }

    async function apiGet(path){
      const res = await fetch(endpoint(path), {headers:{"Accept":"application/json"}, cache:"no-store"});
      if(!res.ok) throw new Error(`${path} returned ${res.status}`);
      return res.json();
    }

    async function apiPost(path, body){
      const res = await fetch(endpoint(path), {
        method:"POST",
        headers:{"Content-Type":"application/json","Accept":"application/json"},
        body:JSON.stringify(body)
      });
      const json = await res.json().catch(() => ({}));
      if(!res.ok || json.ok === false) throw new Error(json.error || json.message || `${path} returned ${res.status}`);
      return json;
    }

    function unwrap(raw, keys=[]){
      if(!raw) return null;
      let obj = raw;
      for(const key of keys){
        if(obj && obj[key] != null) obj = obj[key];
      }
      if(obj && obj.data && typeof obj.data === "object") return obj.data;
      if(obj && obj.result && typeof obj.result === "object") return obj.result;
      if(obj && obj.listing && typeof obj.listing === "object") return obj.listing;
      return obj;
    }

    function pick(obj, paths){
      for(const path of paths){
        const parts = path.split(".");
        let cur = obj;
        for(const p of parts){
          if(cur == null) break;
          cur = cur[p];
        }
        if(cur != null && cur !== "") return cur;
      }
      return "";
    }

    function asArray(value){
      if(!value) return [];
      if(Array.isArray(value)) return value;
      if(Array.isArray(value.items)) return value.items;
      if(Array.isArray(value.results)) return value.results;
      if(Array.isArray(value.images)) return value.images;
      if(Array.isArray(value.data)) return value.data;
      return [];
    }

    function money(value, currency="USD"){
      const n = Number(value);
      if(!Number.isFinite(n)) return "";
      try{return new Intl.NumberFormat("en-US",{style:"currency",currency,maximumFractionDigits:0}).format(n)}
      catch{return `$${Math.round(n)}`}
    }

    function formatDate(date){
      return date.toISOString().slice(0,10);
    }

    function addDays(date, days){
      const d = new Date(date);
      d.setDate(d.getDate()+days);
      return d;
    }

    function monthStart(date){
      return new Date(date.getFullYear(), date.getMonth(), 1);
    }

    function monthEnd(date){
      return new Date(date.getFullYear(), date.getMonth()+1, 0);
    }


    function localizedText(value){
      if(value == null) return "";
      if(typeof value === "string" || typeof value === "number") return clean(value);
      if(typeof value === "object"){
        const langKey = String(state.lang || "en").slice(0,2).toLowerCase();
        const candidates = [value[langKey], value.en, value.fr, value.de, value.ru, value.he, value.title, value.name, value.summary, value.description, value.text, value.plainText, value.body];
        for(const item of candidates){
          const txt = localizedText(item);
          if(txt) return txt;
        }
      }
      return "";
    }

    function firstTextFrom(sources, paths){
      for(const source of sources){
        if(!source) continue;
        const direct = localizedText(source);
        if(direct && typeof source !== "object") return direct;
        for(const path of paths){
          const txt = localizedText(pick(source, [path]));
          if(txt) return txt;
        }
      }
      return "";
    }

    function normalizeListing(raw){
      const l = unwrap(raw) || {};
      const contentRoot = state.content || {};
      const contentSources = [contentRoot, contentRoot.content, contentRoot.property, contentRoot.listing, contentRoot.page, contentRoot.hero, contentRoot.data, contentRoot.result].filter(Boolean);
      const publicDescription = l.publicDescription || l.description || l.descriptions || l.descriptionSummary || {};
      const terms = l.terms || l.policies || {};
      const addressObj = l.address || l.location || {};

      const title = firstTextFrom([l].concat(contentSources),["title","name","nickname","internalName","listing.title","listing.name","propertyTitle","heroTitle","hero.title"]);
      const summary = firstTextFrom(contentSources,["summary","description","overview","plainText","text","body","hero.description","heroLead","property.description","listing.description","content.description"]) || firstTextFrom([publicDescription,l],["summary","description","plainText","text","overview","publicDescription.summary","descriptionSummary"]);
      const space = firstTextFrom([publicDescription,l].concat(contentSources),["space","theSpace","property","rooms","publicDescription.space","sections.space"]);
      const access = firstTextFrom([publicDescription,l].concat(contentSources),["access","guestAccess","interactionWithGuests","transit","publicDescription.access"]);
      const notes = firstTextFrom([publicDescription,l].concat(contentSources),["notes","neighborhood","houseRules","otherThingsToNote","publicDescription.notes"]);

      const address = clean(pick(addressObj,["full","fullAddress","display","street","addressLine1"])) || [addressObj.street, addressObj.city, addressObj.state, addressObj.country].filter(Boolean).join(", ");
      const lat = Number(pick(addressObj,["lat","latitude","geo.lat","coordinates.lat"]));
      const lng = Number(pick(addressObj,["lng","lon","longitude","geo.lng","geo.lon","coordinates.lng","coordinates.lon"]));

      const guests = Number(pick(l,["accommodates","occupancy","maxOccupancy","maxGuests","pricing.guestsIncludedInRegularFee"])) || "";
      const bedrooms = Number(pick(l,["bedrooms","bedroomCount","roomCount.bedrooms","property.bedrooms"])) || "";
      const bathrooms = pick(l,["bathrooms","bathroomsFull","bathroomCount","roomCount.bathrooms","property.bathrooms"]);
      const beds = pick(l,["beds","bedCount","roomCount.beds"]);
      const currency = clean(pick(l,["currency","prices.currency","pricing.currency"])) || "CHF";
      const basePrice = pick(l,["basePrice","prices.basePrice","pricing.basePrice","pricing.nightly","defaultDailyPrice"]);

      return {
        raw:l,
        id:clean(pick(l,["_id","id","listingId","propertyId"])),
        title,
        summary,
        space,
        access,
        notes,
        address:clean(address),
        lat:Number.isFinite(lat) ? lat : null,
        lng:Number.isFinite(lng) ? lng : null,
        guests,
        bedrooms,
        bathrooms:clean(bathrooms),
        beds,
        currency,
        basePrice,
        rooms:normalizeRooms(l),
        amenities:normalizeAmenities(l),
        policies:normalizePolicies(l, terms),
        contacts:normalizeContacts(l)
      };
    }

    function normalizeContacts(l){
      const phone = clean(pick(l,["phone","contact.phone","account.phone","host.phone"]));
      const email = clean(pick(l,["email","contact.email","account.email","host.email"]));
      return {phone,email};
    }

    function normalizeRooms(l){
      const rooms = asArray(pick(l,["rooms","bedroomsList","bedroomsData","roomDetails"]));
      if(rooms.length){
        return rooms.map((room, i) => {
          const title = clean(room.title || room.name || room.type || `Bedroom ${i+1}`);
          const beds = asArray(room.beds || room.bedTypes).map(b => {
            const count = b.count || b.quantity || b.numberOfBeds || 1;
            const type = clean(b.type || b.name || b.bedType || "Bed");
            return `${count} ${type}`;
          }).join(", ") || clean(room.bed || room.description || room.summary);
          return {title,beds};
        }).filter(r => r.title || r.beds);
      }

      const beds = asArray(pick(l,["beds","bedTypes","bed"]));
      if(beds.length){
        return beds.map((bed, i) => ({
          title:clean(bed.room || bed.roomName || bed.title || `Sleeping area ${i+1}`),
          beds:clean(`${bed.count || bed.numberOfBeds || bed.quantity || 1} ${bed.type || bed.name || bed.bedType || "Bed"}`)
        }));
      }

      const bedrooms = Number(pick(l,["bedrooms","bedroomCount"]));
      const bedCount = Number(pick(l,["bedsCount","bedCount","roomCount.beds"]));
      if(bedrooms || bedCount){
        return [{title:"Sleeping arrangements", beds:[bedrooms ? `${bedrooms} bedrooms` : "", bedCount ? `${bedCount} beds` : ""].filter(Boolean).join(" · ")}];
      }
      return [];
    }

    function normalizeAmenities(l){
      const raw = asArray(pick(l,["amenities","amenityFeature","features","propertyAmenities"]));
      return raw.map(a => clean(a.title || a.name || a.type || a)).filter(Boolean).map(formatLabel).filter(unique);
    }

    function normalizePolicies(l, terms){
      const out = [];
      const checkIn = clean(pick(l,["checkInTime","defaultCheckInTime","terms.checkIn","pms.checkInTime"]));
      const checkOut = clean(pick(l,["checkOutTime","defaultCheckOutTime","terms.checkOut","pms.checkOutTime"]));
      const rules = clean(pick(terms,["houseRules","rules","notes"])) || clean(pick(l,["houseRules","publicDescription.houseRules"]));
      const cancellation = clean(pick(terms,["cancellation","cancellationPolicy","cancellationPolicyName"])) || clean(pick(l,["cancellationPolicy","cancellationPolicyName"]));

      if(checkIn || checkOut) out.push({title:"Arrival", body:[checkIn ? `Check-in: ${checkIn}` : "", checkOut ? `Check-out: ${checkOut}` : ""].filter(Boolean).join("\n")});
      if(rules) out.push({title:"House rules", body:rules});
      if(cancellation) out.push({title:"Cancellation", body:cancellation});
      return out;
    }

    function formatLabel(value){
      return clean(value)
        .replace(/([a-z])([A-Z])/g,"$1 $2")
        .replace(/[_-]+/g," ")
        .replace(/\b\w/g,c=>c.toUpperCase());
    }

    function unique(value, index, arr){
      return value && arr.indexOf(value) === index;
    }

    function normalizeImages(raw){
      const base = unwrap(raw) || raw;
      const arr = asArray(base);
      return arr.map(item => {
        if(typeof item === "string") return item;
        return item.url || item.src || item.original || item.thumbnail || item.large || item.medium || item.secure_url || item.originalUrl || item.imageUrl || "";
      }).map(clean).filter(Boolean).filter(unique);
    }

    function normalizeCalendar(raw){
      const base = unwrap(raw) || raw;
      const arr = Array.isArray(base) ? base : asArray(base.days || base.calendar || base.rates || base.availability || base.data || base);
      const map = new Map();
      arr.forEach(item => {
        const date = clean(item.date || item.day || item.startDate || item.start || item.dateString);
        if(!date) return;
        const price = item.price ?? item.basePrice ?? item.rate ?? item.amount ?? pick(item,["price.total","price.basePrice","pricing.price","pricing.basePrice"]);
        const currency = clean(item.currency || item.priceCurrency || pick(item,["price.currency","pricing.currency"])) || (state.listing && state.listing.currency) || "USD";
        const status = clean(item.status || item.availability || item.type || "").toLowerCase();
        const available = item.available ?? item.isAvailable ?? item.selectable ?? item.availableForCheckIn;
        const blocked = available === false || status.includes("book") || status.includes("block") || status.includes("unavailable") || item.blocked === true || item.isBlocked === true;
        map.set(date.slice(0,10), {date:date.slice(0,10), price, currency, blocked, status});
      });
      return map;
    }

    function fillSelect(select, max, start=0, selected=0){
      select.innerHTML = "";
      for(let i=start;i<=max;i++){
        const option = document.createElement("option");
        option.value = String(i);
        option.textContent = String(i);
        if(i === selected) option.selected = true;
        select.appendChild(option);
      }
    }

    function setContent(id, value){
      const el = $(id);
      if(el) el.textContent = clean(value);
    }

    function setHtml(id, value){
      const el = $(id);
      if(el) el.innerHTML = htmlText(value);
    }

    function showIf(sectionId, condition){
      const el = $(sectionId);
      if(el) el.classList.toggle("has-content", Boolean(condition));
    }

    function renderListing(){
      const l = state.listing;
      if(!l) return;

      document.title = l.title ? `${l.title} · Book your stay` : "Book your stay";
      const meta = document.querySelector('meta[name="description"]');
      if(meta && l.summary) meta.content = l.summary.slice(0,155);

      setContent("heroKicker", l.title || "Direct booking");
      setContent("propertyTitle", l.title);
      setContent("propertyAddress", l.address);
      setContent("propertySummary", l.summary);
      setContent("guestCount", l.guests);
      setContent("bedroomCount", l.bedrooms);
      setContent("bathroomCount", l.bathrooms);

      const hasMeta = Boolean(l.guests || l.bedrooms || l.bathrooms);
      $("metaRow").hidden = !hasMeta;

      const basePrice = Number(l.basePrice);
      $("fromPrice").innerHTML = Number.isFinite(basePrice) ? `From <strong>${money(basePrice,l.currency)}</strong> / night` : "";

      setHtml("descriptionFull", l.summary || pick(l.raw,["description","publicDescription.summary"]));
      setHtml("descriptionSpace", l.space);
      setHtml("descriptionAccess", l.access);
      setHtml("descriptionNotes", l.notes);

      toggleBlock("summaryBlock", $("descriptionFull").innerHTML);
      toggleBlock("spaceBlock", $("descriptionSpace").innerHTML);
      toggleBlock("accessBlock", $("descriptionAccess").innerHTML);
      toggleBlock("notesBlock", $("descriptionNotes").innerHTML);
      showIf("aboutSection", document.querySelectorAll("#aboutSection .tm-description-block.has-content").length > 0);

      renderRooms(l.rooms);
      renderAmenities(l.amenities);
      renderPolicies(l.policies);
      renderLocation(l);
      renderFooter(l);
      setupGuestLimits(l.guests || 32);
    }

    function toggleBlock(id, content){
      const el = $(id);
      if(el) el.classList.toggle("has-content", Boolean(clean(content)) || Boolean(content));
    }

    function renderRooms(rooms){
      const grid = $("roomsGrid");
      grid.innerHTML = "";
      rooms.forEach(room => {
        const card = document.createElement("article");
        card.className = "tm-card";
        card.innerHTML = `<h3>${escapeHtml(room.title)}</h3><div>${escapeHtml(room.beds)}</div>`;
        grid.appendChild(card);
      });
      showIf("roomsSection", rooms.length);
    }

    function renderAmenities(amenities){
      const grid = $("amenitiesGrid");
      grid.innerHTML = "";
      amenities.slice(0, CONFIG.MAX_AMENITIES).forEach(name => {
        const item = document.createElement("div");
        item.className = "tm-amenity";
        item.textContent = name;
        grid.appendChild(item);
      });
      showIf("amenitiesSection", amenities.length);
    }

    function renderPolicies(policies){
      const grid = $("policiesGrid");
      grid.innerHTML = "";
      policies.forEach(policy => {
        const card = document.createElement("article");
        card.className = "tm-card";
        card.innerHTML = `<h3>${escapeHtml(policy.title)}</h3><div>${escapeHtml(policy.body).replace(/\n/g,"<br>")}</div>`;
        grid.appendChild(card);
      });
      showIf("policiesSection", policies.length);
    }

    function renderLocation(l){
      const hasCoordinates = l.lat != null && l.lng != null;
      if(hasCoordinates){
        $("mapFrame").innerHTML = `<iframe loading="lazy" referrerpolicy="no-referrer-when-downgrade" src="https://www.google.com/maps?q=${encodeURIComponent(l.lat+','+l.lng)}&z=13&output=embed"></iframe>`;
      }
      $("locationLines").textContent = l.address || "";
      showIf("locationSection", hasCoordinates || l.address);
    }

    function renderFooter(l){
      setContent("footerBrand", l.title || "Book your stay");
      setContent("footerAddress", l.address);
      const contact = [l.contacts.email, l.contacts.phone].filter(Boolean).join("\n");
      $("footerContact").innerHTML = escapeHtml(contact).replace(/\n/g,"<br>");
      $("footerBooking").textContent = "Direct booking powered by the property booking system.";
      $("inquiryCopy").textContent = l.title ? `Send a question about ${l.title}.` : "Send a question about this stay.";
    }

    function renderImages(){
      const grid = $("photoGrid");
      const modal = $("modalGrid");
      grid.innerHTML = "";
      modal.innerHTML = "";
      const images = state.images;

      images.slice(0, CONFIG.MAX_VISIBLE_PHOTOS).forEach((src, index) => {
        const card = document.createElement("button");
        card.type = "button";
        card.className = "tm-photo-card";
        card.setAttribute("aria-label", `Open photo ${index+1}`);
        card.innerHTML = `<img src="${escapeHtml(src)}" alt="" loading="${index < 4 ? "eager" : "lazy"}" decoding="async">`;
        card.addEventListener("click", openPhotoModal);
        grid.appendChild(card);
      });

      if(images.length){
        const overlay = document.createElement("div");
        overlay.className = "tm-photo-overlay";
        overlay.innerHTML = `<button class="tm-small-btn" type="button">View all photos</button>`;
        overlay.querySelector("button").addEventListener("click", openPhotoModal);
        grid.appendChild(overlay);
      }

      images.forEach(src => {
        const img = document.createElement("img");
        img.src = src;
        img.alt = "";
        img.loading = "lazy";
        modal.appendChild(img);
      });
    }

    function openPhotoModal(){
      $("photoModal").classList.add("is-open");
      $("photoModal").setAttribute("aria-hidden","false");
    }

    function closePhotoModal(){
      $("photoModal").classList.remove("is-open");
      $("photoModal").setAttribute("aria-hidden","true");
    }

    function setupGuestLimits(maxGuests){
      const max = Math.max(1, Math.min(Number(maxGuests) || 32, 60));
      fillSelect($("adults"), max, 1, 2);
      fillSelect($("children"), max, 0, 0);
      fillSelect($("calAdults"), max, 1, 2);
      fillSelect($("calChildren"), max, 0, 0);
    }

    async function loadCalendar(){
      const monthValue = $("calMonth").value;
      const base = monthValue ? new Date(monthValue + "-01T00:00:00") : monthStart(new Date());
      const from = formatDate(monthStart(base));
      const to = formatDate(addDays(monthEnd(new Date(base.getFullYear(), base.getMonth()+1, 1)), 1));
      $("calendarStatus").textContent = "";

      try{
        const raw = await apiGet(`calendar?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`);
        state.calendar = normalizeCalendar(raw);
        renderCalendar(base);
      }catch(error){
        $("calendarStatus").textContent = "Calendar could not load.";
        renderCalendar(base);
      }
    }

    function renderCalendar(base){
      const wrap = $("calendarWrap");
      wrap.innerHTML = "";
      [0,1].forEach(offset => {
        const date = new Date(base.getFullYear(), base.getMonth()+offset, 1);
        wrap.appendChild(renderMonth(date));
      });
      refreshSelection();
    }

    function renderMonth(date){
      const month = document.createElement("div");
      month.className = "tm-month";
      const title = date.toLocaleString("en-US", {month:"long",year:"numeric"});
      month.innerHTML = `<div class="tm-month-title">${escapeHtml(title)}</div><div class="tm-weekdays"><span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span></div><div class="tm-days"></div>`;
      const days = month.querySelector(".tm-days");
      const first = monthStart(date);
      const last = monthEnd(date);
      for(let i=0;i<first.getDay();i++){
        const empty = document.createElement("div");
        empty.className = "tm-day is-empty";
        days.appendChild(empty);
      }
      for(let d=1; d<=last.getDate(); d++){
        const cur = new Date(date.getFullYear(), date.getMonth(), d);
        const iso = formatDate(cur);
        const data = state.calendar.get(iso);
        const past = cur < monthStart(new Date()) && iso < formatDate(new Date());
        const blocked = past || (data && data.blocked);
        const cell = document.createElement("button");
        cell.type = "button";
        cell.className = "tm-day" + (blocked ? " is-blocked" : "");
        cell.dataset.date = iso;
        cell.disabled = Boolean(blocked);
        cell.innerHTML = `<span class="tm-day-number">${d}</span>${data && data.price ? `<span class="tm-day-price">${money(data.price,data.currency)}</span>` : ""}`;
        cell.addEventListener("click", () => selectDate(iso));
        days.appendChild(cell);
      }
      return month;
    }

    function selectDate(iso){
      if(!state.selectedStart || (state.selectedStart && state.selectedEnd) || iso < state.selectedStart){
        state.selectedStart = iso;
        state.selectedEnd = null;
        $("checkIn").value = iso;
        $("checkOut").value = "";
      }else if(iso > state.selectedStart){
        state.selectedEnd = iso;
        $("checkOut").value = iso;
      }
      refreshSelection();
      maybeQuote();
    }

    function refreshSelection(){
      document.querySelectorAll(".tm-day").forEach(cell => {
        const iso = cell.dataset.date;
        const selected = iso && state.selectedStart && (iso === state.selectedStart || iso === state.selectedEnd || (state.selectedEnd && iso > state.selectedStart && iso < state.selectedEnd));
        cell.classList.toggle("is-selected", Boolean(selected));
      });
    }

    function quotePayload(){
      const checkIn = $("checkIn").value;
      const checkOut = $("checkOut").value;
      const adults = Number($("adults").value || 1);
      const children = Number($("children").value || 0);
      const listingId = CONFIG.PROPERTY_ID || (state.listing && state.listing.id) || "";
      return {
        listingId,
        propertyId:listingId,
        checkIn,
        checkOut,
        from:checkIn,
        to:checkOut,
        numberOfGuests:{
          numberOfAdults:adults,
          numberOfChildren:children,
          numberOfInfants:0,
          numberOfPets:0
        },
        guests:{adults,children,infants:0,pets:0}
      };
    }

    function canQuote(){
      const p = quotePayload();
      return p.checkIn && p.checkOut && p.checkOut > p.checkIn && p.numberOfGuests.numberOfAdults > 0;
    }

    async function maybeQuote(){
      $("continueBtn").disabled = true;
      $("bookingStatus").textContent = "";
      $("bookingStatus").classList.remove("is-error");
      if(!canQuote()) return;

      try{
        const quote = await apiPost("quote", quotePayload());
        state.lastQuote = quote;
        renderQuote(quote);
        $("continueBtn").disabled = false;
      }catch(error){
        $("quoteBox").classList.remove("has-content");
        $("bookingStatus").textContent = error.message || "Price could not load.";
        $("bookingStatus").classList.add("is-error");
      }
    }

    function findPrice(obj){
      const candidates = [
        "total", "totalPrice", "amount", "price", "quote.total", "quote.totalPrice",
        "money.total", "pricing.total", "rates.total", "invoice.total", "reservation.money.hostPayout"
      ];
      for(const path of candidates){
        const value = pick(obj,path.split ? [path] : path);
        const n = Number(value);
        if(Number.isFinite(n) && n > 0) return n;
      }
      if(obj && typeof obj === "object"){
        for(const value of Object.values(obj)){
          if(value && typeof value === "object"){
            const nested = findPrice(value);
            if(nested) return nested;
          }
        }
      }
      return null;
    }

    function renderQuote(quote){
      const currency = clean(pick(quote,["currency","quote.currency","pricing.currency"])) || (state.listing && state.listing.currency) || "USD";
      const total = findPrice(quote);
      const nights = nightsBetween($("checkIn").value, $("checkOut").value);
      const rows = [];
      rows.push([`${nights} night${nights === 1 ? "" : "s"}`, total ? money(total,currency) : "Live price loaded"]);
      if(total) rows.push(["Total", money(total,currency)]);
      $("quoteBox").innerHTML = rows.map(([a,b]) => `<div class="tm-quote-row"><span>${escapeHtml(a)}</span><span>${escapeHtml(b)}</span></div>`).join("");
      $("quoteBox").classList.add("has-content");
    }

    function nightsBetween(start,end){
      const a = new Date(start + "T00:00:00");
      const b = new Date(end + "T00:00:00");
      return Math.max(1, Math.round((b-a)/86400000));
    }

    function continueToCheckout(){
      if(!canQuote()) return;
      const p = quotePayload();
      const params = new URLSearchParams({
        checkIn:p.checkIn,
        checkOut:p.checkOut,
        adults:String(p.numberOfGuests.numberOfAdults),
        children:String(p.numberOfGuests.numberOfChildren),
        listingId:p.listingId || ""
      });
      sessionStorage.setItem("fh_booking_payload", JSON.stringify({payload:p, quote:state.lastQuote, listing:state.listing}));
      window.location.href = `${CONFIG.CHECKOUT_URL}?${params.toString()}`;
    }

    function syncDateInputs(){
      state.selectedStart = $("checkIn").value || null;
      state.selectedEnd = $("checkOut").value || null;
      refreshSelection();
      maybeQuote();
    }

    async function loadAll(){
      const today = new Date();
      $("calMonth").value = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}`;
      fillSelect($("adults"), 32, 1, 2);
      fillSelect($("children"), 32, 0, 0);
      fillSelect($("calAdults"), 32, 1, 2);
      fillSelect($("calChildren"), 32, 0, 0);

      const [contentRaw, listingRaw, imagesRaw] = await Promise.allSettled([
        apiGet(`content?lang=${encodeURIComponent(state.lang)}`),
        apiGet("listing"),
        apiGet("images")
      ]);

      if(contentRaw.status === "fulfilled") state.content = unwrap(contentRaw.value) || contentRaw.value;
      if(listingRaw.status === "fulfilled") state.listing = normalizeListing(listingRaw.value);
      else state.listing = normalizeListing({});
      if(imagesRaw.status === "fulfilled") state.images = normalizeImages(imagesRaw.value);

      renderListing();
      renderImages();
      await loadCalendar();
    }

    function bindEvents(){
      $("closePhotoModal").addEventListener("click", closePhotoModal);
      $("photoModal").addEventListener("click", (e) => { if(e.target.id === "photoModal") closePhotoModal(); });
      $("reloadCalendar").addEventListener("click", loadCalendar);
      $("continueBtn").addEventListener("click", continueToCheckout);
      ["checkIn","checkOut","adults","children"].forEach(id => $(id).addEventListener("change", syncDateInputs));
      $("calAdults").addEventListener("change", () => { $("adults").value = $("calAdults").value; maybeQuote(); });
      $("calChildren").addEventListener("change", () => { $("children").value = $("calChildren").value; maybeQuote(); });
      $("inquiryForm").addEventListener("submit", (e) => {
        e.preventDefault();
        $("inquiryStatus").textContent = "Inquiry form is ready to connect to the Worker or CRM endpoint.";
      });
    }

    bindEvents();
    loadAll().catch(error => {
      $("bookingStatus").textContent = error.message || "Worker content could not load.";
      $("bookingStatus").classList.add("is-error");
    });
  </script>
</body>
</html>
