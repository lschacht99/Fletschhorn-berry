<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title data-field="seoTitle"></title>
  <meta name="description" content="" data-field="seoDescription" />

  <style>
    :root{
      --ink:#171717;
      --muted:#6e6257;
      --soft:#f6f0e7;
      --paper:#fffaf3;
      --line:rgba(30,22,14,.12);
      --accent:#9b5f33;
      --accent-dark:#6d3f22;
      --green:#233a2d;
      --green-soft:#e9efe6;
      --danger:#9b1f1f;
      --radius:26px;
      --shadow:0 22px 70px rgba(40,28,18,.12);
      --serif:Georgia,"Times New Roman",serif;
      --sans:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:var(--sans);
      color:var(--ink);
      background:linear-gradient(180deg,#fbf7f0 0%,#f0e5d8 48%,#fbf7f0 100%);
      overflow-x:hidden;
    }
    a{color:inherit;text-decoration:none}
    img{display:block;max-width:100%}
    button,input,select,textarea{font:inherit}

    .page-shell{min-height:100vh;background:
      radial-gradient(circle at 10% 0%,rgba(255,255,255,.85),transparent 28%),
      radial-gradient(circle at 90% 14%,rgba(166,112,70,.14),transparent 24%),
      radial-gradient(circle at 20% 72%,rgba(36,58,45,.10),transparent 26%);
    }

    .site-header{
      position:sticky;
      top:0;
      z-index:50;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      padding:14px clamp(16px,4vw,54px);
      background:rgba(255,250,243,.86);
      border-bottom:1px solid var(--line);
      backdrop-filter:blur(18px);
    }
    .brand{display:flex;align-items:center;gap:12px;min-width:0}
    .brand-mark{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:#fff;overflow:hidden;display:grid;place-items:center}
    .brand-mark img{width:100%;height:100%;object-fit:contain}
    .brand-name{font-family:var(--serif);font-size:24px;line-height:1;white-space:nowrap;min-width:80px}
    .brand-sub{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
    .nav{display:flex;align-items:center;gap:18px;font-size:13px;color:#3b332c}
    .nav a{opacity:.82}
    .nav a:hover{opacity:1}
    .nav .book-link{padding:10px 16px;border-radius:999px;background:var(--green);color:#fff;opacity:1}

    .hero-gallery{padding:18px clamp(12px,3vw,34px) 0}
    .photo-strip{
      display:grid;
      grid-template-columns:1.35fr 1fr 1fr;
      gap:10px;
      min-height:clamp(260px,48vw,610px);
    }
    .photo-tile{
      position:relative;
      overflow:hidden;
      border-radius:24px;
      background:rgba(255,255,255,.45);
      border:1px solid rgba(255,255,255,.7);
      box-shadow:0 18px 55px rgba(43,31,21,.10);
    }
    .photo-tile:first-child{grid-row:span 2}
    .photo-tile img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .35s ease,transform .7s ease;filter:saturate(.9) contrast(1.02)}
    .photo-tile img[src]{opacity:1}
    .photo-tile:hover img{transform:scale(1.025)}
    .photo-actions{position:absolute;right:18px;bottom:18px;z-index:2}
    .small-action{border:0;border-radius:999px;background:rgba(255,250,243,.9);padding:10px 14px;box-shadow:0 12px 28px rgba(0,0,0,.14);cursor:pointer}

    .main-wrap{width:min(1220px,calc(100% - 28px));margin:0 auto;padding:34px 0 80px}
    .title-layout{display:grid;grid-template-columns:minmax(0,1fr) minmax(320px,420px);gap:28px;align-items:start}
    .eyebrow{min-height:18px;margin:0 0 10px;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:700}
    h1{font-family:var(--serif);font-size:clamp(40px,6vw,78px);font-weight:400;line-height:.95;letter-spacing:-.045em;margin:0 0 16px;min-height:1.8em}
    .lead{font-size:18px;line-height:1.72;color:#4d4239;max-width:760px;min-height:80px;margin:0}
    .meta-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-top:24px}
    .meta-card{padding:16px;border:1px solid var(--line);border-radius:18px;background:rgba(255,250,243,.72)}
    .meta-card b{display:block;font-family:var(--serif);font-size:30px;font-weight:400;min-height:34px}
    .meta-card span{display:block;margin-top:5px;font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted)}

    .booking-card{
      position:sticky;
      top:88px;
      padding:22px;
      border-radius:var(--radius);
      background:rgba(255,250,243,.92);
      border:1px solid rgba(255,255,255,.78);
      box-shadow:var(--shadow);
    }
    .booking-card h2{font-family:var(--serif);font-size:34px;font-weight:400;line-height:1;margin:0 0 6px}
    .price-line{min-height:26px;color:var(--muted);margin-bottom:16px}
    .booking-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .field{display:grid;gap:7px}
    .field.full{grid-column:1/-1}
    .field label{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);font-weight:800}
    .field input,.field select{
      width:100%;
      min-height:48px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--ink);
      padding:0 12px;
      outline:none;
    }
    .field input:focus,.field select:focus{border-color:rgba(155,95,51,.45);box-shadow:0 0 0 4px rgba(155,95,51,.10)}
    .quote-box{margin-top:14px;padding:14px;border-radius:16px;background:var(--green-soft);border:1px solid rgba(35,58,45,.10);min-height:72px}
    .quote-row{display:flex;justify-content:space-between;gap:14px;padding:6px 0;border-bottom:1px solid rgba(35,58,45,.10);font-size:14px}
    .quote-row:last-child{border-bottom:0;font-weight:800}
    .button{width:100%;min-height:50px;margin-top:14px;border:0;border-radius:999px;background:var(--green);color:#fff;font-weight:800;cursor:pointer;box-shadow:0 16px 36px rgba(35,58,45,.24)}
    .button.secondary{background:#fff;color:var(--green);border:1px solid rgba(35,58,45,.18);box-shadow:none}
    .button:disabled{opacity:.45;cursor:not-allowed}
    .status-line{min-height:20px;margin-top:10px;font-size:13px;color:var(--muted)}
    .status-line.error{color:var(--danger)}

    .section{padding:58px 0;border-top:1px solid var(--line)}
    .section-head{display:grid;grid-template-columns:minmax(0,.55fr) minmax(0,1fr);gap:28px;align-items:start;margin-bottom:24px}
    .section h2{font-family:var(--serif);font-size:clamp(34px,4.6vw,58px);font-weight:400;line-height:1;margin:0}
    .section-copy{font-size:17px;line-height:1.75;color:#4f453c;min-height:92px}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .content-card{padding:26px;border-radius:24px;background:rgba(255,250,243,.76);border:1px solid var(--line);min-height:170px}
    .content-card h3{font-family:var(--serif);font-size:30px;font-weight:400;line-height:1;margin:0 0 12px}
    .content-card p{margin:0;color:#51463c;line-height:1.7;min-height:80px}

    .feature-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    .feature-card{padding:20px;border-radius:20px;background:rgba(255,255,255,.54);border:1px solid var(--line);min-height:112px}
    .feature-card b{display:block;font-family:var(--serif);font-size:24px;font-weight:400;min-height:28px}
    .feature-card span{display:block;margin-top:8px;color:var(--muted);line-height:1.5;min-height:42px}

    .amenities{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
    .amenity{min-height:48px;padding:13px 14px;border-radius:16px;background:rgba(255,255,255,.58);border:1px solid var(--line);display:flex;align-items:center;gap:8px;color:#3f372f}
    .amenity::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--accent);flex:0 0 auto}

    .calendar-tools{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:end;margin-bottom:14px}
    .calendar-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .day-card{padding:14px;border-radius:18px;background:rgba(255,250,243,.78);border:1px solid var(--line);min-height:86px}
    .day-card .date{font-weight:800;font-size:14px}
    .day-card .state{margin-top:6px;font-size:12px;color:var(--muted)}
    .day-card .rate{margin-top:8px;font-family:var(--serif);font-size:24px;min-height:26px}
    .day-card.blocked{opacity:.55;background:rgba(231,225,218,.75)}
    .day-card.booked{background:#f8e7e7;color:#5d1616}

    .map-shell{min-height:340px;border-radius:26px;overflow:hidden;background:rgba(255,255,255,.5);border:1px solid var(--line);display:grid;place-items:center}
    .map-shell iframe{width:100%;height:380px;border:0;filter:saturate(.85)}
    .address-line{min-height:26px;margin-top:14px;color:#4a4038}

    .footer{padding:34px clamp(16px,4vw,54px);border-top:1px solid var(--line);display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;background:rgba(255,250,243,.78);color:var(--muted);font-size:14px}
    .footer b{color:var(--ink);font-weight:700}

    .modal{position:fixed;inset:0;z-index:90;background:rgba(12,10,8,.86);display:none;padding:18px;overflow:auto}
    .modal.open{display:block}
    .modal-bar{position:sticky;top:0;z-index:2;display:flex;justify-content:flex-end;padding:0 0 12px}
    .modal-close{border:0;border-radius:999px;padding:10px 14px;background:#fff;cursor:pointer}
    .modal-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;width:min(1280px,100%);margin:0 auto}
    .modal-grid img{width:100%;height:260px;object-fit:cover;border-radius:18px;background:#ddd}

    .is-empty:empty::after{content:"";display:inline-block;min-width:1ch;min-height:1em}

    @media (max-width:900px){
      .site-header{align-items:flex-start}
      .brand-sub,.nav a:not(.book-link){display:none}
      .photo-strip{grid-template-columns:1fr 1fr;min-height:auto}
      .photo-tile{height:180px;border-radius:18px}
      .photo-tile:first-child{grid-column:1/-1;grid-row:auto;height:265px}
      .title-layout{grid-template-columns:1fr}
      .booking-card{position:relative;top:auto}
      .section-head{grid-template-columns:1fr}
      .two-col{grid-template-columns:1fr}
      .feature-grid{grid-template-columns:1fr 1fr}
      .amenities{grid-template-columns:1fr 1fr}
      .modal-grid{grid-template-columns:1fr 1fr}
    }

    @media (max-width:560px){
      .site-header{padding:12px 14px}
      .brand-name{font-size:20px}
      .nav .book-link{padding:9px 12px;font-size:12px}
      .hero-gallery{padding:10px 10px 0}
      .photo-strip{grid-template-columns:1fr 1fr;gap:8px}
      .photo-tile{height:130px;border-radius:16px}
      .photo-tile:first-child{height:220px}
      .main-wrap{width:calc(100% - 20px);padding-top:24px}
      .meta-grid{grid-template-columns:1fr 1fr}
      .booking-grid{grid-template-columns:1fr 1fr}
      .field.full{grid-column:1/-1}
      .feature-grid{grid-template-columns:1fr 1fr}
      .amenities{grid-template-columns:1fr 1fr}
      .calendar-grid{grid-template-columns:1fr 1fr}
      .calendar-tools{grid-template-columns:1fr}
      .modal-grid{grid-template-columns:1fr}
      .modal-grid img{height:220px}
    }
  </style>
</head>
<body>
  <div class="page-shell" id="propertyPage">
    <header class="site-header">
      <a class="brand" href="/" aria-label="Home">
        <span class="brand-mark"><img id="brandLogo" alt="" /></span>
        <span>
          <span class="brand-name is-empty" data-field="brandName"></span>
          <span class="brand-sub is-empty" data-field="brandSubtitle"></span>
        </span>
      </a>
      <nav class="nav" aria-label="Main navigation">
        <a href="#overview">Overview</a>
        <a href="#amenities">Amenities</a>
        <a href="#rates">Rates</a>
        <a href="#location">Location</a>
        <a class="book-link" href="#booking">Book</a>
      </nav>
    </header>

    <section class="hero-gallery" aria-label="Property photos">
      <div class="photo-strip" id="photoStrip">
        <figure class="photo-tile"><img data-photo="0" alt="" /><div class="photo-actions"><button class="small-action" type="button" data-open-gallery>View photos</button></div></figure>
        <figure class="photo-tile"><img data-photo="1" alt="" /></figure>
        <figure class="photo-tile"><img data-photo="2" alt="" /></figure>
        <figure class="photo-tile"><img data-photo="3" alt="" /></figure>
        <figure class="photo-tile"><img data-photo="4" alt="" /></figure>
      </div>
    </section>

    <main class="main-wrap">
      <section class="title-layout" id="booking">
        <div>
          <p class="eyebrow is-empty" data-field="locationKicker"></p>
          <h1 class="is-empty" data-field="title"></h1>
          <p class="lead is-empty" data-field="description"></p>

          <div class="meta-grid" aria-label="Property facts">
            <div class="meta-card"><b class="is-empty" data-field="guests"></b><span>Guests</span></div>
            <div class="meta-card"><b class="is-empty" data-field="bedrooms"></b><span>Bedrooms</span></div>
            <div class="meta-card"><b class="is-empty" data-field="bathrooms"></b><span>Bathrooms</span></div>
            <div class="meta-card"><b class="is-empty" data-field="beds"></b><span>Beds</span></div>
          </div>
        </div>

        <aside class="booking-card" aria-label="Booking form">
          <h2>Book your stay</h2>
          <div class="price-line is-empty" id="priceLine"></div>

          <div class="booking-grid">
            <div class="field">
              <label for="checkIn">Check-in</label>
              <input id="checkIn" type="date" />
            </div>
            <div class="field">
              <label for="checkOut">Check-out</label>
              <input id="checkOut" type="date" />
            </div>
            <div class="field">
              <label for="adults">Adults</label>
              <select id="adults"></select>
            </div>
            <div class="field">
              <label for="children">Children</label>
              <select id="children"></select>
            </div>
          </div>

          <button class="button secondary" type="button" id="quoteBtn">Load price</button>
          <div class="quote-box" id="quoteBox" hidden></div>
          <button class="button" type="button" id="checkoutBtn" disabled>Continue</button>
          <div class="status-line" id="bookingStatus"></div>
        </aside>
      </section>

      <section class="section" id="overview">
        <div class="section-head">
          <h2>Property overview</h2>
          <div class="section-copy is-empty" data-field="longDescription"></div>
        </div>
        <div class="two-col">
          <article class="content-card">
            <h3>Guest access</h3>
            <p class="is-empty" data-field="guestAccess"></p>
          </article>
          <article class="content-card">
            <h3>House notes</h3>
            <p class="is-empty" data-field="houseNotes"></p>
          </article>
        </div>
      </section>

      <section class="section" id="highlights">
        <div class="section-head">
          <h2>Highlights</h2>
          <div class="section-copy is-empty" data-field="highlightIntro"></div>
        </div>
        <div class="feature-grid" id="featureGrid"></div>
      </section>

      <section class="section" id="amenities">
        <div class="section-head">
          <h2>Amenities</h2>
          <div class="section-copy is-empty" data-field="amenityIntro"></div>
        </div>
        <div class="amenities" id="amenitiesGrid"></div>
      </section>

      <section class="section" id="rates">
        <div class="section-head">
          <h2>Rates and availability</h2>
          <div class="section-copy is-empty" data-field="ratesIntro"></div>
        </div>
        <div class="calendar-tools">
          <div class="field">
            <label for="calendarMonth">Month</label>
            <input id="calendarMonth" type="month" />
          </div>
          <button class="button secondary" type="button" id="calendarBtn">Load calendar</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </section>

      <section class="section" id="location">
        <div class="section-head">
          <h2>Location</h2>
          <div class="section-copy is-empty" data-field="locationText"></div>
        </div>
        <div class="map-shell" id="mapShell"></div>
        <div class="address-line is-empty" data-field="address"></div>
      </section>
    </main>

    <footer class="footer">
      <div><b class="is-empty" data-field="footerBrand"></b> <span class="is-empty" data-field="footerLocation"></span></div>
      <div class="is-empty" data-field="footerContact"></div>
    </footer>
  </div>

  <div class="modal" id="galleryModal" aria-hidden="true">
    <div class="modal-bar"><button class="modal-close" type="button" data-close-gallery>Close</button></div>
    <div class="modal-grid" id="modalGrid"></div>
  </div>

  <script>
    /*
      FILL ONLY THESE BLANKS FOR ANOTHER PROPERTY / WORKER.
      The visible page stays blank until the Cloudflare Worker answers.
    */
    const PROPERTY_CONFIG = {
      WORKER_BASE: "https://fletschhorn-guesty-api.bookings-e2d.workers.dev/",        // Cloudflare Worker base URL
      PROPERTY_ID: "",        // Optional: Guesty/listing/property id, slug, or leave blank if worker has one default property
      BRAND_NAME: "",         // Optional visible brand name if worker does not send it
      BRAND_SUBTITLE: "",     // Optional visible brand subtitle
      BRAND_LOGO: "",         // Optional logo URL
      CHECKOUT_URL: "checkout.html",

      ENDPOINTS: {
        listing: "/listing",
        images: "/images",
        calendar: "/calendar",
        quote: "/quote"
      }
    };

    const state = {
      property: {},
      images: [],
      calendar: [],
      quote: null
    };

    const $ = (selector, root = document) => root.querySelector(selector);
    const $$ = (selector, root = document) => Array.from(root.querySelectorAll(selector));

    function clean(value){
      if(value === null || value === undefined) return "";
      return String(value).replace(/<[^>]*>/g, "").replace(/\s+/g, " ").trim();
    }

    function rootData(payload){
      if(!payload) return {};
      if(payload.ok && payload.data) return payload.data;
      if(payload.ok && payload.listing) return payload.listing;
      if(payload.ok && payload.property) return payload.property;
      if(payload.data) return payload.data;
      return payload;
    }

    function endpoint(path, params = {}){
      if(!PROPERTY_CONFIG.WORKER_BASE){
        return null;
      }
      const url = new URL(path, PROPERTY_CONFIG.WORKER_BASE.replace(/\/$/, ""));
      if(PROPERTY_CONFIG.PROPERTY_ID){
        url.searchParams.set("propertyId", PROPERTY_CONFIG.PROPERTY_ID);
        url.searchParams.set("listingId", PROPERTY_CONFIG.PROPERTY_ID);
      }
      Object.entries(params).forEach(([key,value]) => {
        if(value !== "" && value !== null && value !== undefined) url.searchParams.set(key, value);
      });
      return url.toString();
    }

    async function apiGet(path, params = {}){
      const url = endpoint(path, params);
      if(!url) return null;
      const res = await fetch(url, {headers:{"Accept":"application/json"}});
      if(!res.ok) throw new Error(path + " " + res.status);
      return res.json();
    }

    async function apiPost(path, body = {}){
      const url = endpoint(path);
      if(!url) return null;
      const res = await fetch(url, {
        method:"POST",
        headers:{"Accept":"application/json","Content-Type":"application/json"},
        body:JSON.stringify(body)
      });
      if(!res.ok) throw new Error(path + " " + res.status);
      return res.json();
    }

    function pick(obj, paths){
      for(const path of paths){
        const value = path.split(".").reduce((acc,key) => acc && acc[key], obj);
        if(value !== undefined && value !== null && value !== "") return value;
      }
      return "";
    }

    function normalizeProperty(raw){
      const p = rootData(raw);
      const addressObj = pick(p,["address","publicAddress","location.address"]);
      const address = typeof addressObj === "string" ? addressObj : [
        pick(p,["address.street","address.full","address.line1","location.address.street"]),
        pick(p,["address.city","address.locality","location.city"]),
        pick(p,["address.state","address.region","location.state"]),
        pick(p,["address.country","location.country"])
      ].filter(Boolean).join(", ");

      const city = pick(p,["address.city","address.locality","location.city","city"]);
      const region = pick(p,["address.state","address.region","location.state","region"]);
      const country = pick(p,["address.country","location.country","country"]);

      return {
        brandName: clean(pick(p,["brandName","brand.name"]) || PROPERTY_CONFIG.BRAND_NAME),
        brandSubtitle: clean(pick(p,["brandSubtitle","brand.subtitle"]) || PROPERTY_CONFIG.BRAND_SUBTITLE),
        brandLogo: pick(p,["brandLogo","logo","brand.logo"]) || PROPERTY_CONFIG.BRAND_LOGO,
        title: clean(pick(p,["title","name","nickname","listing.title","listing.name"])),
        seoTitle: clean(pick(p,["seoTitle","title","name"])),
        description: clean(pick(p,["description","summary","publicDescription.summary","shortDescription"])),
        longDescription: clean(pick(p,["longDescription","space","publicDescription.space","publicDescription.description","description"])),
        guestAccess: clean(pick(p,["guestAccess","publicDescription.access","access"])),
        houseNotes: clean(pick(p,["houseNotes","notes","publicDescription.notes","houseRules"])),
        highlightIntro: clean(pick(p,["highlightIntro","headline","tagline"])),
        amenityIntro: clean(pick(p,["amenityIntro"])),
        ratesIntro: clean(pick(p,["ratesIntro"])),
        locationText: clean(pick(p,["locationText","neighborhoodOverview","publicDescription.neighborhood","location.description"])),
        address: clean(address),
        locationKicker: clean([city,region,country].filter(Boolean).join(" · ")),
        footerLocation: clean([city,region].filter(Boolean).join(", ")),
        footerContact: clean(pick(p,["contact","phone","email","reservationPhone"])),
        latitude: pick(p,["latitude","lat","address.lat","geo.latitude","location.lat"]),
        longitude: pick(p,["longitude","lng","address.lng","geo.longitude","location.lng"]),
        guests: pick(p,["accommodates","guests","maxGuests","occupancy.value","terms.maxOccupancy"]),
        bedrooms: pick(p,["bedrooms","numberOfBedrooms","accommodations.bedrooms"]),
        bathrooms: pick(p,["bathrooms","numberOfBathrooms","numberOfBathroomsTotal","accommodations.bathrooms"]),
        beds: pick(p,["beds","numberOfBeds","accommodations.beds"]),
        minStay: pick(p,["minStay","terms.minNights","minimumNights"]),
        maxGuests: pick(p,["maxGuests","accommodates","terms.maxOccupancy"]),
        currency: pick(p,["currency","prices.currency","pricing.currency"]) || "USD",
        basePrice: pick(p,["basePrice","baseRent","prices.basePrice","pricing.base","lowestPrice","offers.price"]),
        features: normalizeFeatures(p),
        amenities: normalizeAmenities(p)
      };
    }

    function normalizeFeatures(p){
      const raw = pick(p,["features","highlights","marketingHighlights"]);
      if(Array.isArray(raw)){
        return raw.map(item => typeof item === "string" ? {title:item, text:""} : {
          title:clean(item.title || item.name || item.label),
          text:clean(item.text || item.description || item.value)
        }).filter(item => item.title || item.text);
      }
      return [];
    }

    function normalizeAmenities(p){
      const raw = pick(p,["amenities","amenityFeature","features.amenities"]);
      if(Array.isArray(raw)){
        return raw.map(item => clean(typeof item === "string" ? item : (item.name || item.label || item.title))).filter(Boolean);
      }
      return [];
    }

    function normalizeImages(raw){
      const root = rootData(raw);
      const arr = Array.isArray(root) ? root : (root.images || root.photos || root.pictures || root.results || []);
      return arr.map(item => {
        if(typeof item === "string") return {url:item, alt:""};
        return {
          url:item.url || item.src || item.original || item.thumbnail || item.secure_url || item.downloadUrl || "",
          alt:item.alt || item.caption || item.name || ""
        };
      }).filter(item => item.url);
    }

    function normalizeCalendar(raw){
      const root = rootData(raw);
      const arr = Array.isArray(root) ? root : (root.days || root.calendar || root.results || root.availability || []);
      return arr.map(item => {
        const date = item.date || item.day || item.startDate || item.checkIn || "";
        const status = String(item.status || item.availability || "").toLowerCase();
        const available = item.available === true || status.includes("available") || status === "open";
        const booked = status.includes("book") || status.includes("reserved");
        const priceObj = item.price || item.rate || item.amount || item.nightlyRate || "";
        const price = typeof priceObj === "object" ? (priceObj.amount || priceObj.value || priceObj.total || "") : priceObj;
        const currency = item.currency || state.property.currency || "USD";
        return {date, available, booked, price, currency, minStay:item.minStay || item.minNights || ""};
      }).filter(item => item.date);
    }

    function setField(name, value){
      $$(`[data-field="${name}"]`).forEach(el => { el.textContent = clean(value); });
    }

    function populateSelects(maxGuests = 32){
      const adults = $("#adults");
      const children = $("#children");
      adults.innerHTML = "";
      children.innerHTML = "";
      const max = Math.max(1, Number(maxGuests) || 32);
      for(let i=1;i<=max;i++) adults.append(new Option(String(i), String(i), i === 1, i === 1));
      for(let i=0;i<=Math.min(12,max);i++) children.append(new Option(String(i), String(i), i === 0, i === 0));
    }

    function formatMoney(amount, currency){
      const n = Number(amount);
      if(!Number.isFinite(n)) return clean(amount);
      try{
        return new Intl.NumberFormat("en-US", {style:"currency", currency:currency || "USD", maximumFractionDigits:0}).format(n);
      }catch(_){
        return String(Math.round(n));
      }
    }

    function formatDate(dateString){
      const date = new Date(dateString + "T00:00:00");
      if(Number.isNaN(date.getTime())) return dateString;
      return date.toLocaleDateString("en-US", {month:"short", day:"numeric"});
    }

    function populateProperty(p){
      state.property = p;
      document.title = p.seoTitle || p.title || "";
      const metaDescription = document.querySelector('meta[name="description"]');
      if(metaDescription) metaDescription.setAttribute("content", p.description || "");

      setField("brandName", p.brandName);
      setField("brandSubtitle", p.brandSubtitle);
      setField("title", p.title);
      setField("description", p.description);
      setField("longDescription", p.longDescription);
      setField("guestAccess", p.guestAccess);
      setField("houseNotes", p.houseNotes);
      setField("highlightIntro", p.highlightIntro);
      setField("amenityIntro", p.amenityIntro);
      setField("ratesIntro", p.ratesIntro);
      setField("locationText", p.locationText);
      setField("address", p.address);
      setField("locationKicker", p.locationKicker);
      setField("footerBrand", p.brandName || p.title);
      setField("footerLocation", p.footerLocation);
      setField("footerContact", p.footerContact);
      setField("guests", p.guests);
      setField("bedrooms", p.bedrooms);
      setField("bathrooms", p.bathrooms);
      setField("beds", p.beds);

      const logo = $("#brandLogo");
      if(p.brandLogo){ logo.src = p.brandLogo; }
      else { logo.removeAttribute("src"); }

      $("#priceLine").textContent = p.basePrice ? `Starting at ${formatMoney(p.basePrice, p.currency)} / night` : "";
      populateSelects(p.maxGuests || p.guests || 32);
      populateFeatures(p.features);
      populateAmenities(p.amenities);
      populateMap(p);
    }

    function populateImages(images){
      state.images = images;
      $$("[data-photo]").forEach(img => {
        const index = Number(img.getAttribute("data-photo"));
        const photo = images[index];
        if(photo && photo.url){ img.src = photo.url; img.alt = photo.alt || state.property.title || ""; }
        else { img.removeAttribute("src"); img.alt = ""; }
      });
      const modalGrid = $("#modalGrid");
      modalGrid.innerHTML = "";
      images.forEach(photo => {
        const img = document.createElement("img");
        img.src = photo.url;
        img.alt = photo.alt || state.property.title || "";
        img.loading = "lazy";
        modalGrid.appendChild(img);
      });
    }

    function populateFeatures(features = []){
      const grid = $("#featureGrid");
      grid.innerHTML = "";
      features.slice(0,9).forEach(feature => {
        const card = document.createElement("article");
        card.className = "feature-card";
        card.innerHTML = `<b>${clean(feature.title)}</b><span>${clean(feature.text)}</span>`;
        grid.appendChild(card);
      });
    }

    function populateAmenities(amenities = []){
      const grid = $("#amenitiesGrid");
      grid.innerHTML = "";
      amenities.slice(0,40).forEach(name => {
        const div = document.createElement("div");
        div.className = "amenity";
        div.textContent = clean(name).replace(/([a-z])([A-Z])/g,"$1 $2");
        grid.appendChild(div);
      });
    }

    function populateMap(p){
      const shell = $("#mapShell");
      shell.innerHTML = "";
      if(p.latitude && p.longitude){
        const iframe = document.createElement("iframe");
        iframe.loading = "lazy";
        iframe.referrerPolicy = "no-referrer-when-downgrade";
        iframe.src = `https://www.google.com/maps?q=${encodeURIComponent(p.latitude + "," + p.longitude)}&output=embed`;
        shell.appendChild(iframe);
      }
    }

    function monthRange(monthValue){
      const now = new Date();
      const value = monthValue || `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
      const [year,month] = value.split("-").map(Number);
      const from = new Date(year, month - 1, 1);
      const to = new Date(year, month, 1);
      const iso = d => d.toISOString().slice(0,10);
      return {from:iso(from), to:iso(to), value};
    }

    async function loadCalendar(){
      const status = $("#bookingStatus");
      const {from, to, value} = monthRange($("#calendarMonth").value);
      $("#calendarMonth").value = value;
      try{
        const raw = await apiGet(PROPERTY_CONFIG.ENDPOINTS.calendar, {from, to});
        state.calendar = normalizeCalendar(raw);
        renderCalendar(state.calendar);
      }catch(error){
        renderCalendar([]);
        status.textContent = "Calendar could not load.";
        status.classList.add("error");
      }
    }

    function renderCalendar(days){
      const grid = $("#calendarGrid");
      grid.innerHTML = "";
      days.forEach(day => {
        const card = document.createElement("div");
        card.className = "day-card" + (day.booked ? " booked" : day.available ? "" : " blocked");
        const stateText = day.booked ? "Booked" : day.available ? "Available" : "Unavailable";
        card.innerHTML = `
          <div class="date">${formatDate(day.date)}</div>
          <div class="state">${stateText}${day.minStay ? " · " + clean(day.minStay) + " night min" : ""}</div>
          <div class="rate">${day.price ? formatMoney(day.price, day.currency) : ""}</div>
        `;
        grid.appendChild(card);
      });
    }

    function quotePayload(){
      const checkIn = $("#checkIn").value;
      const checkOut = $("#checkOut").value;
      const adults = Number($("#adults").value || 1);
      const children = Number($("#children").value || 0);
      return {
        propertyId: PROPERTY_CONFIG.PROPERTY_ID || undefined,
        checkIn,
        checkOut,
        checkInDateLocalized: checkIn,
        checkOutDateLocalized: checkOut,
        numberOfGuests: {
          numberOfAdults: adults,
          numberOfChildren: children,
          numberOfInfants: 0,
          numberOfPets: 0
        },
        guests: adults + children,
        adults,
        children
      };
    }

    async function loadQuote(){
      const status = $("#bookingStatus");
      const box = $("#quoteBox");
      const checkout = $("#checkoutBtn");
      status.textContent = "";
      status.classList.remove("error");
      box.hidden = true;
      checkout.disabled = true;

      const payload = quotePayload();
      if(!payload.checkIn || !payload.checkOut){
        status.textContent = "Select dates.";
        status.classList.add("error");
        return;
      }

      try{
        let raw;
        try{
          raw = await apiPost(PROPERTY_CONFIG.ENDPOINTS.quote, payload);
        }catch(_){
          raw = await apiGet(PROPERTY_CONFIG.ENDPOINTS.quote, payload);
        }
        state.quote = rootData(raw);
        renderQuote(state.quote);
        checkout.disabled = false;
      }catch(error){
        status.textContent = "Price could not load.";
        status.classList.add("error");
      }
    }

    function renderQuote(raw){
      const q = rootData(raw);
      const currency = pick(q,["currency","money.currency"]) || state.property.currency || "USD";
      const rent = pick(q,["rent","fareAccommodation","accommodationFare","rates.rent","subtotal"]);
      const fees = pick(q,["fees","totalFees","feeTotal","rates.fees"]);
      const taxes = pick(q,["taxes","totalTaxes","taxTotal","rates.taxes"]);
      const total = pick(q,["total","totalPrice","grandTotal","money.hostPayout","quote.total"]);

      const rows = [
        ["Rent", rent],
        ["Fees", fees],
        ["Taxes", taxes],
        ["Total", total]
      ].filter(([,value]) => value !== "" && value !== undefined && value !== null);

      const box = $("#quoteBox");
      box.innerHTML = rows.map(([label,value]) => `<div class="quote-row"><span>${label}</span><span>${formatMoney(value, currency)}</span></div>`).join("");
      box.hidden = rows.length === 0;
    }

    function continueCheckout(){
      const payload = quotePayload();
      const draft = {
        property: state.property,
        quote: state.quote,
        images: state.images.slice(0,5),
        selection: payload
      };
      sessionStorage.setItem("propertyBookingDraft", JSON.stringify(draft));
      const url = new URL(PROPERTY_CONFIG.CHECKOUT_URL, window.location.href);
      Object.entries({
        propertyId: PROPERTY_CONFIG.PROPERTY_ID,
        checkIn: payload.checkIn,
        checkOut: payload.checkOut,
        adults: payload.adults,
        children: payload.children
      }).forEach(([key,value]) => { if(value !== "" && value !== undefined) url.searchParams.set(key,value); });
      window.location.href = url.toString();
    }

    async function init(){
      populateSelects();
      const {value} = monthRange();
      $("#calendarMonth").value = value;

      $$("[data-open-gallery]").forEach(btn => btn.addEventListener("click", () => {
        $("#galleryModal").classList.add("open");
        $("#galleryModal").setAttribute("aria-hidden","false");
      }));
      $$("[data-close-gallery]").forEach(btn => btn.addEventListener("click", () => {
        $("#galleryModal").classList.remove("open");
        $("#galleryModal").setAttribute("aria-hidden","true");
      }));
      $("#quoteBtn").addEventListener("click", loadQuote);
      $("#checkoutBtn").addEventListener("click", continueCheckout);
      $("#calendarBtn").addEventListener("click", loadCalendar);

      if(!PROPERTY_CONFIG.WORKER_BASE){
        return;
      }

      const [listingResult, imagesResult] = await Promise.allSettled([
        apiGet(PROPERTY_CONFIG.ENDPOINTS.listing),
        apiGet(PROPERTY_CONFIG.ENDPOINTS.images)
      ]);

      if(listingResult.status === "fulfilled"){
        populateProperty(normalizeProperty(listingResult.value));
      }
      if(imagesResult.status === "fulfilled"){
        populateImages(normalizeImages(imagesResult.value));
      }
      await loadCalendar();
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
