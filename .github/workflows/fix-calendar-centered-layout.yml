name: One-shot calendar centered layout fix

on:
  push:
    branches:
      - fix/calendar-centered-layout

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/calendar-centered-layout
          fetch-depth: 0

      - name: Patch global and booking calendar layout
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          header_path = Path('assets/Header.html')
          booking_path = Path('booking.html')
          header = header_path.read_text(encoding='utf-8')
          booking = booking_path.read_text(encoding='utf-8')

          header_marker = 'FINAL VIEWPORT-CENTERED SCHEDULE LAYOUT FIX'
          header_css = r'''

/* FINAL VIEWPORT-CENTERED SCHEDULE LAYOUT FIX
   Presentation/scroll-lock only. Worker, pricing, payload and redirect logic remain untouched. */
html.fh-toolbar-calendar-open,
html.fh-toolbar-calendar-open body,
html.fh-calendar-open,
html.fh-calendar-open body,
body.fh-calendar-open{
  overflow:hidden!important;
  overscroll-behavior:none!important;
}

#fhToolbarCalendarModal{
  position:fixed!important;
  inset:0!important;
  width:100vw!important;
  height:100dvh!important;
  min-height:100dvh!important;
  display:none!important;
  align-items:center!important;
  justify-content:center!important;
  padding:20px!important;
  margin:0!important;
  overflow:hidden!important;
  z-index:999999!important;
}

#fhToolbarCalendarModal.open{
  display:flex!important;
  align-items:center!important;
  justify-content:center!important;
  visibility:visible!important;
  opacity:1!important;
  pointer-events:auto!important;
}

#fhToolbarCalendarModal .fh-calendar-card,
#fhToolbarCalendarModal [class*="calendar-card"]{
  position:relative!important;
  inset:auto!important;
  left:auto!important;
  right:auto!important;
  top:auto!important;
  bottom:auto!important;
  transform:none!important;
  width:min(760px,calc(100vw - 32px))!important;
  max-width:760px!important;
  max-height:calc(100dvh - 40px)!important;
  margin:0!important;
  overflow:auto!important;
  overscroll-behavior:contain!important;
  pointer-events:auto!important;
  -webkit-overflow-scrolling:touch!important;
}

@media(max-width:760px){
  #fhToolbarCalendarModal{
    align-items:flex-end!important;
    justify-content:center!important;
    padding:0!important;
  }
  #fhToolbarCalendarModal.open{
    align-items:flex-end!important;
    justify-content:center!important;
  }
  #fhToolbarCalendarModal .fh-calendar-card,
  #fhToolbarCalendarModal [class*="calendar-card"]{
    width:100%!important;
    max-width:none!important;
    max-height:86dvh!important;
    margin:0!important;
    border-radius:18px 18px 0 0!important;
  }
}
'''

          if header_marker not in header:
              header = header.replace('</style>', header_css + '\n</style>', 1)

          old_open = '''  function openToolbarCalendarModal(modal){
    if(!modal) return false;

    modal.classList.add("open");
    modal.setAttribute("aria-hidden", "false");
    document.documentElement.classList.add("fh-toolbar-calendar-open");

    if(modal.dataset.fhGlobalCalendarInjected === "1"){
      renderToolbarCalendar();
    }

    return true;
  }'''
          new_open = '''  function openToolbarCalendarModal(modal){
    if(!modal) return false;

    if(modal.parentElement !== document.body && fhModalAncestorBreaksFixed(modal)){
      document.body.appendChild(modal);
    }
    modal.classList.add("open");
    modal.setAttribute("aria-hidden", "false");
    modal.scrollTop = 0;
    document.documentElement.classList.add("fh-toolbar-calendar-open", "fh-calendar-open");
    document.body.classList.add("fh-calendar-open");

    if(modal.dataset.fhGlobalCalendarInjected === "1"){
      renderToolbarCalendar();
    }

    return true;
  }'''
          if old_open in header:
              header = header.replace(old_open, new_open, 1)
          elif 'document.body.classList.add("fh-calendar-open")' not in header:
              raise SystemExit('Header openToolbarCalendarModal signature changed; refusing unsafe patch')

          old_close = '''  function closeToolbarCalendar(){
    const modal = document.getElementById("fhToolbarCalendarModal");
    if(modal){
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
    }
    document.documentElement.classList.remove("fh-toolbar-calendar-open");
    delete document.documentElement.dataset.fhHeaderScheduleActive;
  }'''
          new_close = '''  function closeToolbarCalendar(){
    const modal = document.getElementById("fhToolbarCalendarModal");
    if(modal){
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
    }
    document.documentElement.classList.remove("fh-toolbar-calendar-open", "fh-calendar-open");
    document.body.classList.remove("fh-calendar-open");
    delete document.documentElement.dataset.fhHeaderScheduleActive;
  }'''
          if old_close in header:
              header = header.replace(old_close, new_close, 1)
          elif 'document.body.classList.remove("fh-calendar-open")' not in header:
              raise SystemExit('Header closeToolbarCalendar signature changed; refusing unsafe patch')

          booking_marker = 'FINAL BOOKING-PAGE VIEWPORT-CENTERED SCHEDULE FIX'
          booking_css = r'''

/* FINAL BOOKING-PAGE VIEWPORT-CENTERED SCHEDULE FIX
   Layout/scroll-lock only; existing Worker, calendar, quote and checkout flow are unchanged. */
html.fh-booking-calendar-open,
html.fh-booking-calendar-open body,
body.fh-booking-calendar-open{
  overflow:hidden!important;
  overscroll-behavior:none!important;
}

#fhScheduleModal.fh-modal{
  position:fixed!important;
  inset:0!important;
  width:100vw!important;
  height:100dvh!important;
  min-height:100dvh!important;
  display:none!important;
  align-items:center!important;
  justify-content:center!important;
  padding:20px!important;
  margin:0!important;
  overflow:hidden!important;
  z-index:999999!important;
}

#fhScheduleModal.fh-modal.open{
  display:flex!important;
  align-items:center!important;
  justify-content:center!important;
  visibility:visible!important;
  opacity:1!important;
  pointer-events:auto!important;
}

#fhScheduleModal .fh-modal-card{
  position:relative!important;
  inset:auto!important;
  left:auto!important;
  right:auto!important;
  top:auto!important;
  bottom:auto!important;
  transform:none!important;
  width:min(760px,calc(100vw - 32px))!important;
  max-width:760px!important;
  max-height:calc(100dvh - 40px)!important;
  margin:0!important;
  overflow:auto!important;
  overscroll-behavior:contain!important;
  pointer-events:auto!important;
  -webkit-overflow-scrolling:touch!important;
}

@media(max-width:760px){
  #fhScheduleModal.fh-modal{
    align-items:flex-end!important;
    justify-content:center!important;
    padding:0!important;
  }
  #fhScheduleModal.fh-modal.open{
    align-items:flex-end!important;
    justify-content:center!important;
  }
  #fhScheduleModal .fh-modal-card{
    width:100%!important;
    max-width:none!important;
    max-height:86dvh!important;
    margin:0!important;
    border-radius:18px 18px 0 0!important;
  }
}
'''

          if booking_marker not in booking:
              booking = booking.replace('</style>', booking_css + '\n</style>', 1)

          old_booking_open = '''    function openScheduleModal(){
      var modal = $("fhScheduleModal");
      if (!modal) return;
      modal.classList.add("open");
      modal.setAttribute("aria-hidden","false");
      renderCalendars();
    }'''
          new_booking_open = '''    function openScheduleModal(){
      var modal = $("fhScheduleModal");
      if (!modal) return;
      modal.classList.add("open");
      modal.setAttribute("aria-hidden","false");
      modal.scrollTop = 0;
      document.documentElement.classList.add("fh-booking-calendar-open");
      document.body.classList.add("fh-booking-calendar-open");
      renderCalendars();
    }'''
          if old_booking_open in booking:
              booking = booking.replace(old_booking_open, new_booking_open, 1)
          elif 'document.body.classList.add("fh-booking-calendar-open")' not in booking:
              raise SystemExit('booking openScheduleModal signature changed; refusing unsafe patch')

          old_booking_close = '''    function closeScheduleModal(){
      var modal = $("fhScheduleModal");
      if (!modal) return;
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden","true");
    }'''
          new_booking_close = '''    function closeScheduleModal(){
      var modal = $("fhScheduleModal");
      if (!modal) return;
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden","true");
      document.documentElement.classList.remove("fh-booking-calendar-open");
      document.body.classList.remove("fh-booking-calendar-open");
    }'''
          if old_booking_close in booking:
              booking = booking.replace(old_booking_close, new_booking_close, 1)
          elif 'document.body.classList.remove("fh-booking-calendar-open")' not in booking:
              raise SystemExit('booking closeScheduleModal signature changed; refusing unsafe patch')

          # Static safety checks: no backend/redirect identifiers are removed.
          for token in [
              'fletschhorn-guesty-api.bookings-e2d.workers.dev',
              'loadCalendar()',
              'continueCheckout()',
              'localStorage.setItem("fhBookingStart"',
              'window.location.href = CFG.checkoutUrl'
          ]:
              if token not in booking:
                  raise SystemExit(f'Required booking-flow token missing after patch: {token}')

          for token in [
              'FH_WORKER_BASE',
              'fetchToolbarCalendarMonth()',
              'goToBookingWithDates',
              'localStorage.setItem("fhArrival"'
          ]:
              if token not in header:
                  raise SystemExit(f'Required global-calendar token missing after patch: {token}')

          header_path.write_text(header, encoding='utf-8')
          booking_path.write_text(booking, encoding='utf-8')
          PY

      - name: Verify scoped changes
        shell: bash
        run: |
          grep -n "FINAL VIEWPORT-CENTERED SCHEDULE LAYOUT FIX" assets/Header.html
          grep -n "FINAL BOOKING-PAGE VIEWPORT-CENTERED SCHEDULE FIX" booking.html
          grep -n "document.body.classList.add(\"fh-calendar-open\")" assets/Header.html
          grep -n "document.body.classList.add(\"fh-booking-calendar-open\")" booking.html
          git diff --check
          git diff -- assets/Header.html booking.html

      - name: Commit repair and remove one-shot workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/fix-calendar-centered-layout.yml
          git add assets/Header.html booking.html
          git commit -m "Center schedule modals within the viewport"
          git push origin HEAD:fix/calendar-centered-layout
