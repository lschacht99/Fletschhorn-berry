name: One-shot Squarespace rebuild

on:
  push:
    branches:
      - fix/sync-squarespace-calendar-layout
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/sync-squarespace-calendar-layout
          fetch-depth: 0

      - name: Regenerate all paste-ready Squarespace files
        run: python3 squarespace/_build/build_squarespace.py

      - name: Validate generated files
        run: |
          test -f squarespace/global/1-custom-css.css
          test -f squarespace/global/2-code-injection-header.html
          test -f squarespace/global/3-code-injection-footer.html
          test -f squarespace/pages/home.html
          test -f squarespace/pages/property.html
          test -f squarespace/pages/experiences.html
          test -f squarespace/pages/location.html
          test -f squarespace/pages/wedding-event.html
          test -f squarespace/pages/about-us.html
          test -f squarespace/pages/booking.html
          test -f squarespace/pages/checkout.html
          test -f squarespace/pages/confirmation.html
          grep -q 'Final viewport-safe schedule layout' squarespace/global/1-custom-css.css
          grep -q '#fhToolbarCalendarModal' squarespace/global/2-code-injection-header.html
          grep -q '#fhScheduleModal' squarespace/pages/booking.html
          git diff --check

      - name: Commit regenerated Squarespace mirror
        run: |
          if git diff --quiet -- squarespace; then
            echo 'Squarespace mirror already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add squarespace
          git commit -m 'Regenerate all Squarespace paste-ready files'
          git push origin HEAD:fix/sync-squarespace-calendar-layout
