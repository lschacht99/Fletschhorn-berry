name: One-shot Squarespace rebuild

on:
  push:
    branches:
      - fix/sync-squarespace-calendar-layout
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/sync-squarespace-calendar-layout
          fetch-depth: 0

      - name: Regenerate all paste-ready Squarespace files
        run: python3 squarespace/_build/build_squarespace.py

      - name: Commit regenerated Squarespace mirror
        run: |
          if git diff --quiet -- squarespace; then
            echo 'Squarespace mirror already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add squarespace
          git commit -m 'Regenerate all Squarespace paste-ready files'
          git push origin HEAD:fix/sync-squarespace-calendar-layout
