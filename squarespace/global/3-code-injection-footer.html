<script>
(function(){

  const FH_WORKER_BASE = "https://guetsyapi.moshe-cohen-h1.workers.dev";
  const FH_INQUIRY_ENDPOINT = FH_WORKER_BASE.replace(/\/$/, "") + "/guesty/book-inquiry";

  window.FH_WORKER_BASE = FH_WORKER_BASE;
  window.FH_WORKER_ENDPOINT = FH_WORKER_BASE;
  window.FH_INQUIRY_ENDPOINT = FH_INQUIRY_ENDPOINT;
  window.CLOUDFLARE_INQUIRY_ENDPOINT = FH_INQUIRY_ENDPOINT;

  const FH_FOOTER_PAGES = [
    { label: "Home", href: "/" },
    { label: "Property", href: "/property" },
    { label: "Experiences", href: "/experiences" },
    { label: "Events", href: "/wedding-event" },
    { label: "Location", href: "/location" },
    { label: "Booking", href: "/booking" },
    { label: "About", href: "/about-us" }
  ];

  const FH_SOCIAL_LINKS = [
    {
      label: "Instagram",
      href: "https://www.instagram.com/fletschhornsaasfee/"
    },
    {
      label: "Facebook",
      href: "https://www.facebook.com/waldhotelfletschhornsaasfee"
    },
    {
      label: "Tripadvisor",
      href: "https://www.tripadvisor.com/Hotel_Review-g198839-d236309-Reviews-Waldhotel_Fletschhorn-Saas_Fee_Canton_of_Valais_Swiss_Alps.html"
    },
    {
      label: "LinkedIn",
      href: "https://www.linkedin.com/company/waldhotel-fletschhorn-saas-fee/"
    }
  ];

  /* Guest ratings shown site-wide. Fill in your real score (and review URL)
     for each platform — any row with an empty "score" is hidden, so nothing
     is ever invented. */
  const FH_RATINGS = [
    { source:"Tripadvisor", score:"5.0", url:"https://www.tripadvisor.com/Hotel_Review-g198839-d236309-Reviews-Waldhotel_Fletschhorn-Saas_Fee_Canton_of_Valais_Swiss_Alps.html" },
    { source:"Google",      score:"",    url:"" },
    { source:"Airbnb",      score:"",    url:"" },
    { source:"Booking.com", score:"",    url:"" }
  ];

  function makeTrustBar(){
    const chips = FH_RATINGS.filter(function(r){ return r.score; }).map(function(r){
      const inner = '<span class="fh-trust-star" aria-hidden="true">★</span>' +
                    '<span class="fh-trust-score">' + r.score + '</span>' +
                    '<span class="fh-trust-src">' + r.source + '</span>';
      return r.url
        ? '<a class="fh-trust-chip" href="' + r.url + '" target="_blank" rel="noopener noreferrer" aria-label="' + r.source + ' rating ' + r.score + '">' + inner + '</a>'
        : '<span class="fh-trust-chip">' + inner + '</span>';
    }).join("");
    return '' +
      '<div class="fh-trust-bar" aria-label="Guest ratings and direct-booking benefit">' +
        '<div class="fh-trust-ratings">' +
          '<span class="fh-trust-lead">Trusted by our guests</span>' + chips +
        '</div>' +
        '<div class="fh-trust-direct">' +
          '<strong>Book direct — best price.</strong>' +
          '<span>No Airbnb or Booking.com fees. The lowest rate comes straight from us.</span>' +
        '</div>' +
      '</div>';
  }

  function makeFooter(){
    const links = FH_FOOTER_PAGES.map(page => `
      <a href="${page.href}">${page.label}</a>
    `).join("");

    const socialLinks = FH_SOCIAL_LINKS.map(item => `
      <a href="${item.href}" target="_blank" rel="noopener noreferrer">${item.label}</a>
    `).join("");

    return `
      <footer class="fh-global-footer" id="fhGlobalFooter">
        <div class="fh-footer-shell">

          ${makeTrustBar()}

          <div class="fh-footer-topline"></div>

          <div class="fh-footer-main">

            <div class="fh-footer-brand">
              <a href="/" class="fh-footer-logo" aria-label="Fletschhorn home">
                <span class="fh-footer-mark">
                  <img src="assets/Saas-Fee-Logo.jpeg" alt="Fletschhorn" onerror="this.style.display='none'; this.parentElement.textContent='fh';" />
                </span>
                <span class="fh-footer-wordmark">
                  <strong>Fletschhorn</strong>
                  <small>Private alpine house · Saas-Fee</small>
                </span>
              </a>

              <p>
                A private alpine house for whole-property stays, family gatherings,
                retreats, weddings and quiet mountain weeks above Saas-Fee.
              </p>
            </div>

            <div class="fh-footer-nav-block">
              <h3>Navigate</h3>
              <nav class="fh-footer-links" aria-label="Footer navigation">
                ${links}
              </nav>
            </div>

            <div class="fh-footer-info-block">
              <h3>Private stay</h3>
              <p>
                Exclusive access to the property, 14 rooms reserved for your group,
                daily shuttles, refreshments, kitchen access and optional catering on request.
              </p>

              <div class="fh-footer-social-block">
                <h3>Follow</h3>
                <nav class="fh-footer-social-links" aria-label="Social links">
                  ${socialLinks}
                </nav>
              </div>
            </div>

            <div class="fh-footer-contact-block">
              <h3>Contact</h3>
              <p>
                Waldhotel Fletschhorn<br>
                Wildistrasse<br>
                3906 Saas-Fee, Switzerland
              </p>
              <p class="fh-footer-contact-line">
                <a href="tel:+41279572131">+41 27 957 2131</a><br>
                <a href="mailto:welcome@fletschhorn.ch">welcome@fletschhorn.ch</a>
              </p>
              <a class="fh-footer-cta" href="/booking">Book my stay now</a>
            </div>

          </div>

          <div class="fh-footer-bottom">
            <span>© ${new Date().getFullYear()} Fletschhorn</span>
            <span>Saas-Fee · Switzerland</span>
          </div>

        </div>
      </footer>
    `;
  }

  function initFooter(){
    if(document.getElementById("fhGlobalFooter")) return;

    const nativeFooter = document.querySelector("footer:not(#fhGlobalFooter), .Footer, .SiteFooter, [data-test='footer']");
    if(nativeFooter){
      nativeFooter.style.display = "none";
    }

    document.body.insertAdjacentHTML("beforeend", makeFooter());
  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", initFooter);
  }else{
    initFooter();
  }

})();
</script>
